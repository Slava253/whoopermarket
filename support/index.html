<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WHOPPER - Поддержка</title>
    
    <!-- ЛОКАЛЬНЫЕ БИБЛИОТЕКИ -->
    <script src="../libs/firebase-app-compat.js"></script>
    <script src="../libs/firebase-database-compat.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#0f0f1a; color:#fff; padding:10px; min-height:100vh; }
        .container { max-width:500px; margin:0 auto; }
        .hidden { display:none !important; }
        .header { display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:10px 14px; border-radius:16px; margin-bottom:12px; }
        .logo { font-size:1.2rem; font-weight:bold; color:#f5a623; }
        .user-badge { font-size:0.7rem; color:#888; background:rgba(255,255,255,0.05); padding:4px 12px; border-radius:30px; }
        .user-badge button { background:none; border:none; color:#f5a623; cursor:pointer; margin-left:8px; }
        .btn { padding:8px 16px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; font-size:0.8rem; }
        .btn-primary { background:#f5a623; color:#1a1a2e; }
        .btn-success { background:#4CAF50; color:#fff; }
        .btn-secondary { background:rgba(255,255,255,0.08); color:#fff; }
        .btn-block { width:100%; padding:10px; }
        .form-group { margin-bottom:10px; }
        .form-group label { display:block; font-size:0.7rem; color:#888; margin-bottom:4px; }
        .form-group input { width:100%; padding:10px 14px; border-radius:30px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.05); color:#fff; font-size:0.85rem; outline:none; }
        .auth-box { background:rgba(255,255,255,0.03); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.05); }
        .auth-box h3 { margin-bottom:12px; color:#f5a623; font-size:1rem; }
        .auth-actions { display:flex; gap:8px; margin-top:12px; }
        .auth-actions button { flex:1; padding:10px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; font-size:0.8rem; }
        .support-message { background:rgba(255,255,255,0.03); border-radius:10px; padding:10px 14px; margin-bottom:6px; }
        .support-message .sender { font-weight:bold; font-size:0.75rem; color:#f5a623; }
        .support-message .text { font-size:0.9rem; margin-top:4px; }
        .support-message .time { font-size:0.65rem; color:#555; text-align:right; margin-top:4px; }
        .support-message.admin { border-left:3px solid #f5a623; }
        .support-message.client { border-left:3px solid #4CAF50; }
        .chat-user { background:rgba(255,255,255,0.03); border-radius:10px; padding:10px; margin-bottom:6px; cursor:pointer; border:1px solid rgba(255,255,255,0.05); }
        .chat-user:hover { background:rgba(255,255,255,0.08); }
        .chat-user .name { font-weight:bold; color:#f5a623; }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 24px; border-radius:40px; z-index:999; opacity:0; transition:0.3s; pointer-events:none; font-weight:600; max-width:90%; text-align:center; font-size:0.85rem; }
        .toast.show { opacity:1; }
        @media (max-width:400px) { .chat-user { padding:8px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💬 WHOPPER</div>
        <div class="user-badge">👤 <span id="userNameDisplay">Гость</span> <button onclick="logout()">Выйти</button></div>
    </div>

    <div id="authBox" class="auth-box">
        <h3>💬 Вход поддержки</h3>
        <div class="form-group"><label>Логин</label><input type="text" id="supportLogin" placeholder="Логин"></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="supportPass" placeholder="Пароль"></div>
        <div class="auth-actions">
            <button class="btn-primary" onclick="login()">Войти</button>
            <button class="btn-success" onclick="register()">Регистрация</button>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div id="chatList"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBlZ5ZtyTXgtXxSJAx1jOxwhTrzlHRJmo",
    authDomain: "bk-cashier.firebaseapp.com",
    databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bk-cashier",
    storageBucket: "bk-cashier.firebasestorage.app",
    messagingSenderId: "385000840969",
    appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;
let currentChatUser = null;

function showToast(msg, err = false) {
    let t = document.getElementById('toast');
    if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
    t.textContent = msg;
    t.style.background = err ? '#ef4444' : '#1a1a2e';
    t.classList.add('show');
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
}

function register() {
    const login = document.getElementById('supportLogin').value.trim();
    const pass = document.getElementById('supportPass').value.trim();
    if (!login || !pass) { showToast('❌ Заполните все поля', true); return; }
    db.ref('support_users').orderByChild('login').equalTo(login).once('value', (sn) => {
        if (sn.exists()) { showToast('❌ Логин занят', true); return; }
        const user = { login, password: pass, name: 'Оператор ' + login };
        db.ref('support_users').push().set(user).then(() => {
            currentUser = { login, name: user.name };
            showToast('✅ Регистрация оператора успешна!');
            enterMode();
        });
    });
}

function login() {
    const login = document.getElementById('supportLogin').value.trim();
    const pass = document.getElementById('supportPass').value.trim();
    if (!login || !pass) { showToast('❌ Заполните все поля', true); return; }
    db.ref('support_users').orderByChild('login').equalTo(login).once('value', (sn) => {
        if (sn.exists()) {
            let found = false;
            sn.forEach(child => {
                const u = child.val();
                if (u.password === pass) {
                    currentUser = { login, name: u.name };
                    found = true;
                    showToast('👋 Добро пожаловать, ' + u.name + '!');
                    enterMode();
                }
            });
            if (!found) showToast('❌ Неверный пароль', true);
        } else { showToast('❌ Оператор не найден', true); }
    });
}

function logout() {
    currentUser = null;
    document.getElementById('authBox').classList.remove('hidden');
    document.getElementById('mainContent').classList.add('hidden');
    document.getElementById('userNameDisplay').textContent = 'Гость';
    showToast('👋 Выход выполнен');
}

function enterMode() {
    document.getElementById('authBox').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
    document.getElementById('userNameDisplay').textContent = '💬 ' + currentUser.name;
    loadChats();
}

function loadChats() {
    const container = document.getElementById('chatList');
    db.ref('support_messages').once('value', (sn) => {
        const users = new Set();
        sn.forEach(child => { const m = child.val(); if (m.user) users.add(m.user); });
        if (!users.size) { container.innerHTML = '<div style="color:#555;padding:20px;text-align:center;">💬 Нет обращений</div>'; return; }
        container.innerHTML = Array.from(users).map(u => `
            <div class="chat-user" onclick="openChat('${u}')">
                <div class="name">👤 ${u}</div>
                <div style="font-size:0.7rem;color:#888;">Нажмите для открытия чата</div>
            </div>
        `).join('');
    });
}

function openChat(userLogin) {
    currentChatUser = userLogin;
    const container = document.getElementById('chatList');
    db.ref('support_messages').orderByChild('user').equalTo(userLogin).on('value', (sn) => {
        const msgs = [];
        sn.forEach(child => { msgs.push({ id: child.key, ...child.val() }); });
        msgs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        container.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                <div style="font-weight:bold;color:#f5a623;">💬 Чат с ${userLogin}</div>
                <button class="btn-secondary" onclick="loadChats()" style="padding:4px 12px;font-size:0.7rem;">⬅ Назад</button>
            </div>
            <div id="chatMessages" style="max-height:300px;overflow-y:auto;margin-bottom:8px;">
                ${msgs.length ? msgs.map(m => `
                    <div class="support-message ${m.sender === 'support' ? 'admin' : 'client'}">
                        <div class="sender">${m.sender === 'support' ? '💬 Поддержка' : '👤 ' + (m.userName || 'Клиент')}</div>
                        <div class="text">${m.text}</div>
                        <div class="time">${new Date(m.timestamp).toLocaleString()}</div>
                    </div>
                `).join('') : '<div style="color:#555;text-align:center;padding:20px;">Нет сообщений</div>'}
            </div>
            <div style="display:flex;gap:6px;">
                <input type="text" id="replyInput" placeholder="Ответ..." style="flex:1;padding:8px 14px;border-radius:30px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);color:#fff;font-size:0.85rem;outline:none;">
                <button class="btn-primary" onclick="sendReply()">📤</button>
            </div>
        `;
        const chatMsgs = document.getElementById('chatMessages');
        if (chatMsgs) chatMsgs.scrollTop = chatMsgs.scrollHeight;
    });
}

function sendReply() {
    const input = document.getElementById('replyInput');
    const text = input.value.trim();
    if (!text || !currentChatUser || !currentUser) return;
    const msg = { user: currentChatUser, userName: 'Поддержка', text: text, sender: 'support', timestamp: Date.now(), read: true };
    db.ref('support_messages').push().set(msg).then(() => {
        input.value = '';
        openChat(currentChatUser);
    });
}

console.log('💬 WHOPPER - Поддержка загружена');
</script>
</body>
</html>
