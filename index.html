<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚆 ЖД ПАВЕЛЕЦКОЕ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0e1a;
            min-height: 100vh;
            padding: 10px;
            color: #e8e8e8;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .hidden {
            display: none !important;
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(245, 166, 35, 0.15);
        }
        .header .logo {
            font-size: 1.1rem;
            font-weight: bold;
            color: #f5a623;
        }
        .header .logo i {
            margin-right: 8px;
            color: #f5a623;
        }
        .header .user-badge {
            font-size: 0.65rem;
            color: #aaa;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header .user-badge i {
            color: #f5a623;
            margin-right: 4px;
        }

        /* ===== ВЫБОР РОЛИ ===== */
        .role-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .role-btn {
            flex: 1;
            padding: 8px 4px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            color: #666;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.5rem;
            text-align: center;
            min-width: 45px;
            transition: 0.2s;
        }
        .role-btn.active {
            border-color: #f5a623;
            color: #f5a623;
            background: rgba(245, 166, 35, 0.08);
        }
        .role-btn i {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        /* ===== АВТОРИЗАЦИЯ ===== */
        .auth-box {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .auth-box h3 {
            margin-bottom: 10px;
            color: #f5a623;
            font-size: 0.95rem;
        }
        .auth-box .form-group {
            margin-bottom: 8px;
        }
        .auth-box .form-group label {
            display: block;
            font-size: 0.65rem;
            color: #888;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
        }
        .auth-box .form-group input,
        .auth-box .form-group select {
            width: 100%;
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #e8e8e8;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
        }
        .auth-box .form-group select option {
            background: #1a1a2e;
            color: #e8e8e8;
        }
        .auth-box .form-group input:focus,
        .auth-box .form-group select:focus {
            border-color: #f5a623;
        }
        .auth-box .auth-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        .auth-box .auth-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.15s;
        }
        .auth-box .auth-actions button:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #f5a623;
            color: #1a1a2e;
        }
        .btn-success {
            background: #2e7d32;
            color: white;
        }
        .btn-danger {
            background: #c62828;
            color: white;
        }
        .btn-info {
            background: #0d47a1;
            color: white;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #aaa;
        }
        .btn-admin {
            background: #6c1b7a;
            color: white;
        }

        /* ===== КАРТОЧКА БИЛЕТА ===== */
        .ticket-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
            border-left: 4px solid #f5a623;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.2s;
        }
        .ticket-card:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .ticket-card .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .ticket-card .ticket-number {
            color: #f5a623;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        .ticket-card .ticket-status {
            font-size: 0.6rem;
            padding: 3px 12px;
            border-radius: 30px;
            font-weight: bold;
        }
        .status-active {
            background: rgba(46, 125, 50, 0.25);
            color: #4CAF50;
            border: 1px solid rgba(46, 125, 50, 0.3);
        }
        .status-expired {
            background: rgba(198, 40, 40, 0.2);
            color: #ef5350;
            border: 1px solid rgba(198, 40, 40, 0.2);
        }
        .ticket-card .ticket-route {
            font-weight: bold;
            font-size: 1rem;
            color: #f5a623;
            margin: 4px 0;
        }
        .ticket-card .ticket-info {
            font-size: 0.8rem;
            color: #aaa;
            margin: 3px 0;
        }
        .ticket-card .ticket-info i {
            width: 18px;
            color: #f5a623;
        }
        .ticket-card .qr-container {
            background: white;
            padding: 8px;
            border-radius: 12px;
            display: inline-block;
            margin: 6px 0;
        }
        .ticket-card .qr-container canvas {
            display: block;
            margin: 0 auto;
        }

        /* ===== ТАБЫ ===== */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 6px 16px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            font-size: 0.7rem;
            color: #888;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .tab.active {
            background: rgba(245, 166, 35, 0.1);
            color: #f5a623;
            border-color: rgba(245, 166, 35, 0.2);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            font-weight: 600;
            max-width: 90%;
            text-align: center;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .toast.show {
            opacity: 1;
        }

        /* ===== СКАНЕР ===== */
        .scan-area {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
            border: 2px dashed rgba(255, 255, 255, 0.06);
        }
        .scan-area input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #e8e8e8;
            font-size: 0.9rem;
            text-align: center;
            letter-spacing: 2px;
            font-family: monospace;
            outline: none;
        }
        .scan-area input:focus {
            border-color: #f5a623;
        }
        .scan-area .scan-result {
            margin-top: 8px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: none;
        }
        .scan-area .scan-result.success {
            display: block;
            background: rgba(46, 125, 50, 0.1);
            border: 1px solid rgba(46, 125, 50, 0.2);
        }
        .scan-area .scan-result.error {
            display: block;
            background: rgba(198, 40, 40, 0.1);
            border: 1px solid rgba(198, 40, 40, 0.2);
        }

        /* ===== АДМИН ===== */
        .admin-user-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .admin-user-item .user-info .name {
            font-weight: bold;
            color: #f5a623;
        }
        .admin-user-item .user-info .detail {
            color: #888;
            font-size: 0.65rem;
        }
        .admin-user-item .delete-btn {
            background: rgba(198, 40, 40, 0.15);
            color: #ef5350;
            border: 1px solid rgba(198, 40, 40, 0.15);
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: bold;
            transition: 0.15s;
        }
        .admin-user-item .delete-btn:active {
            transform: scale(0.95);
        }

        /* ===== БЛОК ПОКУПКИ ===== */
        .buy-block {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .buy-block h4 {
            color: #f5a623;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .buy-block .form-group {
            margin-bottom: 8px;
        }
        .buy-block .form-group label {
            display: block;
            font-size: 0.65rem;
            color: #888;
            margin-bottom: 3px;
        }
        .buy-block .form-group input,
        .buy-block .form-group select {
            width: 100%;
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #e8e8e8;
            font-size: 0.85rem;
            outline: none;
        }
        .buy-block .form-group select option {
            background: #1a1a2e;
            color: #e8e8e8;
        }
        .buy-block .form-group input:focus,
        .buy-block .form-group select:focus {
            border-color: #f5a623;
        }
        .buy-block .form-group input[readonly] {
            background: rgba(255, 255, 255, 0.02);
            color: #888;
        }

        /* ===== КНОПКИ ДЕЙСТВИЙ ===== */
        .action-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .action-buttons button {
            flex: 1;
            padding: 8px 12px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
            min-width: 80px;
            transition: 0.15s;
        }
        .action-buttons button:active {
            transform: scale(0.97);
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 400px) {
            .role-btn {
                font-size: 0.45rem;
                padding: 6px 3px;
            }
            .role-btn i {
                font-size: 0.8rem;
            }
            .ticket-card .qr-container canvas {
                width: 100px !important;
                height: 100px !important;
            }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="container" id="app">
        <!-- ШАПКА -->
        <div class="header">
            <div class="logo"><i class="fas fa-train"></i> ЖД Павелецкое</div>
            <div class="user-badge" id="userBadge"><i class="fas fa-user"></i> <span id="userNameDisplay">Гость</span></div>
        </div>

        <!-- ВЫБОР РОЛИ -->
        <div class="role-selector" id="roleSelector">
            <button class="role-btn active" data-role="passenger" onclick="switchRole('passenger')">
                <i class="fas fa-user"></i> Пассажир
            </button>
            <button class="role-btn" data-role="cashier" onclick="switchRole('cashier')">
                <i class="fas fa-ticket-alt"></i> Кассир
            </button>
            <button class="role-btn" data-role="controller" onclick="switchRole('controller')">
                <i class="fas fa-user-check"></i> Контролёр
            </button>
            <button class="role-btn" data-role="admin" onclick="switchRole('admin')">
                <i class="fas fa-user-cog"></i> Админ
            </button>
        </div>

        <!-- ===== ПАССАЖИР ===== -->
        <div id="passengerPanel">
            <div id="passengerAuth" class="auth-box">
                <h3>👤 Вход пассажира</h3>
                <div class="form-group"><label>Телефон</label><input type="tel" id="passengerPhone" placeholder="+7 999 999 99 99"></div>
                <div class="form-group"><label>Имя</label><input type="text" id="passengerName" placeholder="Ваше имя"></div>
                <div class="auth-actions">
                    <button class="btn-primary" onclick="passengerLogin()">Войти</button>
                    <button class="btn-success" onclick="passengerRegister()">Регистрация</button>
                </div>
            </div>
            <div id="passengerContent" class="hidden">
                <div class="buy-block">
                    <h4>🎫 Купить билет</h4>
                    <div class="form-group"><label>Станция назначения</label>
                        <select id="passengerStation">
                            <option value="Павелецкий вокзал">Павелецкий вокзал</option>
                            <option value="Дербеневская">Дербеневская</option>
                            <option value="Тульская">Тульская</option>
                            <option value="Верхние Котлы">Верхние Котлы</option>
                            <option value="Нагатинская">Нагатинская</option>
                            <option value="Варшавская">Варшавская</option>
                            <option value="Чертаново">Чертаново</option>
                            <option value="Котляково">Котляково</option>
                            <option value="Бирюлейко-Тов.">Бирюлейко-Тов.</option>
                            <option value="Бирюлейко-Пасс.">Бирюлейко-Пасс.</option>
                            <option value="Булатниково">Булатниково</option>
                            <option value="Расторгуево">Расторгуево</option>
                            <option value="Калинина">Калинина</option>
                            <option value="Ленинская">Ленинская</option>
                            <option value="32 км">32 км</option>
                            <option value="Домодедово">Домодедово</option>
                            <option value="Взлётная">Взлётная</option>
                            <option value="Востряково">Востряково</option>
                            <option value="Белые столбы">Белые столбы</option>
                            <option value="52 км">52 км</option>
                            <option value="Барыбино">Барыбино</option>
                            <option value="Вельяминово">Вельяминово</option>
                            <option value="Привалово">Привалово</option>
                            <option value="328 км">328 км</option>
                            <option value="332 км">332 км</option>
                            <option value="Малино">Малино</option>
                            <option value="341 км">341 км</option>
                            <option value="Шугарово">Шугарово</option>
                            <option value="85 км">85 км</option>
                            <option value="Жилёво">Жилёво</option>
                            <option value="Ситенка">Ситенка</option>
                            <option value="Ступино">Ступино</option>
                            <option value="Акри">Акри</option>
                            <option value="Белопесоцкий">Белопесоцкий</option>
                            <option value="Кашира">Кашира</option>
                            <option value="Тесна">Тесна</option>
                            <option value="Ожерелье">Ожерелье</option>
                            <option value="121 км">121 км</option>
                            <option value="Пурлово">Пурлово</option>
                            <option value="131 км">131 км</option>
                            <option value="Топканово">Топканово</option>
                            <option value="137 км">137 км</option>
                            <option value="Богатищево">Богатищево</option>
                            <option value="146 км">146 км</option>
                            <option value="Коровино">Коровино</option>
                            <option value="152 км">152 км</option>
                            <option value="Узуново">Узуново</option>
                            <option value="Авиационная">Авиационная</option>
                            <option value="Космос">Космос</option>
                            <option value="Аэропорт Домодедово">Аэропорт Домодедово</option>
                            <option value="Яганово">Яганово</option>
                            <option value="Сотниково">Сотниково</option>
                            <option value="Кольчево">Кольчево</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Тип билета</label>
                        <select id="passengerTicketType">
                            <option value="full">Обычный (100₽)</option>
                            <option value="social">Социальная карта (0₽)</option>
                            <option value="student">Карта москвича/школьника (50₽)</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Направление</label>
                        <select id="passengerDirection">
                            <option value="oneway">Туда</option>
                            <option value="roundtrip">Туда-обратно</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="passengerBuyTicket()" style="width:100%;padding:10px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">🎫 Купить билет</button>
                </div>
                <div class="tabs">
                    <button class="tab active" data-ptab="active" onclick="switchPassengerTab('active')">Активные</button>
                    <button class="tab" data-ptab="history" onclick="switchPassengerTab('history')">История</button>
                </div>
                <div id="passengerTickets"></div>
            </div>
        </div>

        <!-- ===== КАССИР ===== -->
        <div id="cashierPanel" class="hidden">
            <div id="cashierAuth" class="auth-box">
                <h3>🎫 Вход кассира</h3>
                <div class="form-group"><label>Станция</label>
                    <select id="cashierStationSelect">
                        <option value="Павелецкий вокзал">Павелецкий вокзал</option>
                        <option value="Дербеневская">Дербеневская</option>
                        <option value="Тульская">Тульская</option>
                        <option value="Верхние Котлы">Верхние Котлы</option>
                        <option value="Нагатинская">Нагатинская</option>
                        <option value="Варшавская">Варшавская</option>
                        <option value="Чертаново">Чертаново</option>
                        <option value="Котляково">Котляково</option>
                        <option value="Бирюлейко-Тов.">Бирюлейко-Тов.</option>
                        <option value="Бирюлейко-Пасс.">Бирюлейко-Пасс.</option>
                        <option value="Булатниково">Булатниково</option>
                        <option value="Расторгуево">Расторгуево</option>
                        <option value="Калинина">Калинина</option>
                        <option value="Ленинская">Ленинская</option>
                        <option value="32 км">32 км</option>
                        <option value="Домодедово">Домодедово</option>
                        <option value="Взлётная">Взлётная</option>
                        <option value="Востряково">Востряково</option>
                        <option value="Белые столбы">Белые столбы</option>
                        <option value="52 км">52 км</option>
                        <option value="Барыбино">Барыбино</option>
                        <option value="Вельяминово">Вельяминово</option>
                        <option value="Привалово">Привалово</option>
                        <option value="328 км">328 км</option>
                        <option value="332 км">332 км</option>
                        <option value="Малино">Малино</option>
                        <option value="341 км">341 км</option>
                        <option value="Шугарово">Шугарово</option>
                        <option value="85 км">85 км</option>
                        <option value="Жилёво">Жилёво</option>
                        <option value="Ситенка">Ситенка</option>
                        <option value="Ступино">Ступино</option>
                        <option value="Акри">Акри</option>
                        <option value="Белопесоцкий">Белопесоцкий</option>
                        <option value="Кашира">Кашира</option>
                        <option value="Тесна">Тесна</option>
                        <option value="Ожерелье">Ожерелье</option>
                        <option value="121 км">121 км</option>
                        <option value="Пурлово">Пурлово</option>
                        <option value="131 км">131 км</option>
                        <option value="Топканово">Топканово</option>
                        <option value="137 км">137 км</option>
                        <option value="Богатищево">Богатищево</option>
                        <option value="146 км">146 км</option>
                        <option value="Коровино">Коровино</option>
                        <option value="152 км">152 км</option>
                        <option value="Узуново">Узуново</option>
                    </select>
                </div>
                <div class="form-group"><label>Логин</label><input type="text" id="cashierLogin" placeholder="Логин"></div>
                <div class="form-group"><label>Пароль</label><input type="password" id="cashierPassword" placeholder="Пароль"></div>

        // ===== ПЕРЕМЕННЫЕ =====
        let currentUser = { id: null, name: null, type: 'passenger', phone: null, role: null, station: null };

        let controllerStation = 'Павелецкий вокзал';

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
        }

        function getTicketPrice(type) {
            if (type === 'social') return 0;
            if (type === 'student') return 50;
            return 100;
        }

        function getTypeName(type) {
            if (type === 'social') return 'Социальная карта';
            if (type === 'student') return 'Карта москвича/школьника';
            return 'Обычный';
        }

        function getDirectionName(dir) {
            return dir === 'roundtrip' ? 'Туда-обратно' : 'Туда';
        }

        function generateTicketNumber() {
            return String(Math.floor(1000 + Math.random() * 9000));
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ РОЛЕЙ =====
        window.switchRole = function(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.dataset.role === role));
            document.querySelectorAll('#passengerPanel, #cashierPanel, #controllerPanel, #adminPanel')
                .forEach(el => el.classList.add('hidden'));

            if (role === 'passenger') {
                document.getElementById('passengerPanel').classList.remove('hidden');
                document.getElementById('passengerContent').classList.add('hidden');
                document.getElementById('passengerAuth').classList.remove('hidden');
            } else if (role === 'cashier') {
                document.getElementById('cashierPanel').classList.remove('hidden');
                document.getElementById('cashierContent').classList.add('hidden');
                document.getElementById('cashierAuth').classList.remove('hidden');
            } else if (role === 'controller') {
                document.getElementById('controllerPanel').classList.remove('hidden');
                document.getElementById('controllerContent').classList.add('hidden');
                document.getElementById('controllerAuth').classList.remove('hidden');
            } else if (role === 'admin') {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminContent').classList.add('hidden');
                document.getElementById('adminAuth').classList.remove('hidden');
            }
        };

        // =============================================
        // ===== ПАССАЖИР =====
        // =============================================
        window.passengerLogin = function() {
            const phone = document.getElementById('passengerPhone').value.trim();
            if (!phone) { showToast('Введите телефон'); return; }

            db.ref('users').orderByChild('phone').equalTo(phone).once('value', (sn) => {
                if (sn.exists()) {
                    sn.forEach(child => {
                        currentUser.id = child.key;
                        currentUser.name = child.val().name;
                        currentUser.phone = child.val().phone;
                        currentUser.type = 'passenger';
                    });
                    showToast('Добро пожаловать, ' + currentUser.name + '!');
                    enterPassengerMode();
                } else {
                    showToast('Пользователь не найден. Зарегистрируйтесь.');
                }
            });
        };

        window.passengerRegister = function() {
            const phone = document.getElementById('passengerPhone').value.trim();
            const name = document.getElementById('passengerName').value.trim();
            if (!phone || !name) { showToast('Заполните все поля'); return; }

            const userId = 'user_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
            db.ref('users/' + userId).set({
                id: userId,
                name: name,
                phone: phone,
                type: 'passenger',
                createdAt: Date.now()
            }).then(() => {
                currentUser = { id: userId, name: name, phone: phone, type: 'passenger' };
                showToast('Регистрация успешна!');
                enterPassengerMode();
            });
        };

        function enterPassengerMode() {
            document.getElementById('passengerAuth').classList.add('hidden');
            document.getElementById('passengerContent').classList.remove('hidden');
            document.getElementById('userNameDisplay').textContent = currentUser.name + ' 🎫';
            renderPassengerTickets();
        }

        window.passengerBuyTicket = function() {
            if (!currentUser.id) { showToast('Войдите как пассажир'); return; }
            const station = document.getElementById('passengerStation').value;
            const type = document.getElementById('passengerTicketType').value;
            const direction = document.getElementById('passengerDirection').value;
            createTicket(currentUser.id, currentUser.name, currentUser.phone, station, type, direction);
        };

        window.switchPassengerTab = function(tab) {
            passengerTab = tab;
            document.querySelectorAll('#passengerContent .tab[data-ptab]').forEach(t => t.classList.toggle('active', t
                .dataset.ptab === tab));
            renderPassengerTickets();
        };

        function renderPassengerTickets() {
            const container = document.getElementById('passengerTickets');
            db.ref('tickets').orderByChild('userId').equalTo(currentUser.id).on('value', (sn) => {
                const tickets = [];
                sn.forEach(child => tickets.push({ id: child.key, ...child.val() }));
                tickets.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                const filtered = passengerTab === 'active' ?
                    tickets.filter(t => t.status === 'active') :
                    tickets;

                if (filtered.length === 0) {
                    container.innerHTML =
                        '<div style="text-align:center;color:#555;padding:20px;font-size:0.85rem;">Нет билетов</div>';
                    return;
                }

                container.innerHTML = filtered.map(t => `
                    <div class="ticket-card">
                        <div class="ticket-header">
                            <span class="ticket-number">🎫 №${t.ticketNumber || t.id}</span>
                            <span class="ticket-status ${t.status === 'active' ? 'status-active' : 'status-expired'}">
                                ${t.status === 'active' ? '✅ Действителен' : '❌ Недействителен'}
                            </span>
                        </div>
                        <div class="ticket-route">🚆 ${t.station}</div>
                        <div class="ticket-info"><i class="fas fa-user"></i> ${t.passengerName}</div>
                        <div class="ticket-info"><i class="fas fa-phone"></i> ${t.phone}</div>
                        <div class="ticket-info"><i class="fas fa-ticket-alt"></i> ${getTypeName(t.type)}</div>
                        <div class="ticket-info"><i class="fas fa-exchange-alt"></i> ${getDirectionName(t.direction)}</div>
                        <div class="ticket-info"><i class="fas fa-ruble-sign"></i> ${t.price} ₽</div>
                        <div class="ticket-info"><i class="fas fa-clock"></i> До ${new Date(t.expiresAt).toLocaleString()}</div>
                        <div class="qr-container" id="qr_${t.id}"></div>
                        <script>
                            setTimeout(() => {
                                try {
                                    new QRCode(document.getElementById('qr_${t.id}'), {
                                        text: '${t.ticketNumber || t.id}',
                                        width: 120,
                                        height: 120
                                    });
                                } catch(e) {}
                            }, 100);
                        <\/script>
                    </div>
                `).join('');
            });
        }

        // =============================================
        // ===== КАССИР =====
        // =============================================
        window.cashierLogin = function() {
            const station = document.getElementById('cashierStationSelect').value;
            const login = document.getElementById('cashierLogin').value.trim();
            const password = document.getElementById('cashierPassword').value.trim();

            if (!station || !login || !password) { showToast('Заполните все поля'); return; }

            db.ref('cashiers').orderByChild('login').equalTo(login).once('value', (sn) => {
                if (sn.exists()) {
                    let found = false;
                    sn.forEach(child => {
                        const data = child.val();
                        if (data.password === password && data.station === station) {
                            currentUser = {
                                id: child.key,
                                name: data.name,
                                type: 'cashier',
                                role: 'cashier',
                                station: data.station
                            };
                            found = true;

                    showToast('Кассир не найден');
                }
            });

        window.cashierFindUser = function(phone) {
            const nameField = document.getElementById('cashierName');
            if (!phone || phone.length < 10) {
                nameField.value = '';
                nameField.placeholder = 'Имя пассажира';
                return;
            }

            db.ref('users').orderByChild('phone').equalTo(phone).once('value', (sn) => {
                if (sn.exists()) {
                    sn.forEach(child => {
                        nameField.value = child.val().name;
                    });
                } else {
                    nameField.value = '';
                    nameField.placeholder = 'Новый пассажир';
                }
            });

        window.cashierSellTicket = function() {
            const phone = document.getElementById('cashierPhone').value.trim();
            const name = document.getElementById('cashierName').value.trim();
            const station = document.getElementById('cashierStation').value;
            const type = document.getElementById('cashierTicketType').value;
            const direction = document.getElementById('cashierDirection').value;

            if (!phone || !name) { showToast('Введите телефон и имя пассажира'); return; }
            if (phone.length < 10) { showToast('Введите полный номер телефона'); return; }

            db.ref('users').orderByChild('phone').equalTo(phone).once('value', (sn) => {
                let userId;
                if (sn.exists()) {
                    sn.forEach(child => { userId = child.key; });
                    db.ref('users/' + userId + '/name').set(name);
                } else {
                    userId = 'user_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
                    db.ref('users/' + userId).set({
                        id: userId,
                        name: name,
                        phone: phone,
                        type: 'passenger',
                        createdAt: Date.now()
                    });
                }

                const ticketNumber = generateTicketNumber();
                createTicketWithNumber(userId, name, phone, station, type, direction, ticketNumber);

                document.getElementById('cashierPhone').value = '';
                document.getElementById('cashierName').value = '';
                document.getElementById('cashierName').placeholder = 'Имя пассажира';

                showToast('✅ Билет №' + ticketNumber + ' продан!');
                loadCashierTickets();
            });
        };

        function loadCashierTickets() {
            const container = document.getElementById('cashierTickets');
            db.ref('tickets').orderByChild('createdAt').limitToLast(20).on('value', (sn) => {
                const tickets = [];
                sn.forEach(child => tickets.push({ id: child.key, ...child.val() }));
                tickets.reverse();

                if (tickets.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:#555;padding:15px;">Нет билетов</div>';
                    return;
                }

                container.innerHTML = tickets.map(t => `
                    <div class="ticket-card">
                        <div class="ticket-header">
                            <span class="ticket-number">🎫 №${t.ticketNumber || t.id}</span>
                            <span class="ticket-status ${t.status === 'active' ? 'status-active' : 'status-expired'}">
                                ${t.status === 'active' ? '✅ Действителен' : '❌ Недействителен'}
                            </span>
                        </div>
                        <div class="ticket-route">🚆 ${t.station}</div>
                        <div class="ticket-info"><i class="fas fa-user"></i> ${t.passengerName}</div>
                        <div class="ticket-info"><i class="fas fa-phone"></i> ${t.phone}</div>
                        <div class="ticket-info"><i class="fas fa-ticket-alt"></i> ${getTypeName(t.type)}</div>
                        <div class="ticket-info"><i class="fas fa-ruble-sign"></i> ${t.price} ₽</div>
                    </div>
                `).join('');
            });
        }

        // =============================================
        // ===== КОНТРОЛЁР (с продажей) =====
        // =============================================
        window.controllerLogin = function() {
            const login = document.getElementById('controllerLogin').value.trim();
            const password = document.getElementById('controllerPassword').value.trim();

            if (!login || !password) { showToast('Заполните поля'); return; }

            db.ref('controllers').orderByChild('login').equalTo(login).once('value', (sn) => {
                if (sn.exists()) {
                    let found = false;
                    sn.forEach(child => {
                        const data = child.val();
                        if (data.password === password) {
                            currentUser = {
                                id: child.key,
                                name: data.name,
                                type: 'controller',
                                role: 'controller'
                            };
                            found = true;
                            showToast('👋 Добро пожаловать, ' + data.name + '!');
                            document.getElementById('controllerAuth').classList.add('hidden');
                            document.getElementById('controllerContent').classList.remove('hidden');
                            document.getElementById('userNameDisplay').textContent = data.name + ' 🔍';
                        }
                    });
                    if (!found) showToast('Неверный пароль');
                } else {
                    showToast('Контролёр не найден');
                }

        };

            const station = document.getElementById('controllerSellStation').value;
            const type = document.getElementById('controllerSellType').value;

            if (!phone || !name) { showToast('Введите телефон и имя пассажира'); return; }
            if (phone.length < 10) { showToast('Введите полный номер телефона'); return; }

            db.ref('users').orderByChild('phone').equalTo(phone).once('value', (sn) => {

                    sn.forEach(child => { userId = child.key; });

                document.getElementById('controllerSellName').placeholder = 'Имя пассажира';

                showToast('✅ Билет №' + ticketNumber + ' оформлен!');

        window.controllerSetStation = function() {
            const station = prompt('Введите конечную станцию:');
            if (station && allStations.includes(station)) {
                controllerStation = station;
                showToast('📍 Конечная станция: ' + station);
            } else if (station) {
                showToast('❌ Станция не найдена');
            }
        };

        window.controllerScanTicket = function() {
            document.getElementById('controllerScanInput').focus();
            showToast('📷 Введите номер билета');
        };

        window.controllerCheckTicket = function(code) {
            const resultDiv = document.getElementById('controllerScanResult');
            if (!code || code.length < 4) {
                resultDiv.style.display = 'none';
                return;
            }

            db.ref('tickets').orderByChild('ticketNumber').equalTo(code).once('value', (sn) => {
                let found = false;
                sn.forEach(child => {
                    const ticket = child.val();
                    found = true;
                    const now = Date.now();
                    const isValid = ticket.status === 'active' && ticket.expiresAt > now;

                    resultDiv.style.display = 'block';
                    resultDiv.className = 'scan-result ' + (isValid ? 'success' : 'error');
                    resultDiv.innerHTML = `
                        <div style="font-weight:bold;font-size:1rem;margin-bottom:4px;">
                            ${isValid ? '✅ БИЛЕТ ДЕЙСТВИТЕЛЕН' : '❌ БИЛЕТ НЕДЕЙСТВИТЕЛЕН'}
                        </div>
                        <div>🎫 №${ticket.ticketNumber || ticket.id}</div>
                        <div>🚆 ${ticket.station}</div>
                        <div>🧑 ${ticket.passengerName}</div>
                        <div>📱 ${ticket.phone}</div>
                        <div>🎫 ${getTypeName(ticket.type)}</div>
                        <div>🔄 ${getDirectionName(ticket.direction)}</div>
                        <div>💰 ${ticket.price} ₽</div>
                        <div style="font-size:0.75rem;color:#888;">⏳ До ${new Date(ticket.expiresAt).toLocaleString()}</div>
                        ${!isValid ? '<div style="color:#ef5350;margin-top:4px;">Срок действия истёк</div>' : ''}
                        ${controllerStation ? '<div style="color:#4CAF50;margin-top:4px;">📍 Конечная: ' + controllerStation + '</div>' : ''}
                    `;
                });

                if (!found) {
                    resultDiv.style.display = 'block';
                    resultDiv.className = 'scan-result error';
                    resultDiv.innerHTML = '❌ Билет не найден';
                }
            });
        };

        // =============================================
        // ===== АДМИН =====
        // =============================================
        window.adminLogin = function() {
            const login = document.getElementById('adminLogin').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if (login === '2203' && password === '2347') {
                showToast('👋 Добро пожаловать, администратор!');
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                document.getElementById('userNameDisplay').textContent = 'Администратор 🔐';
                switchAdminTab('users');
                switchAdminUsersTab('cashiers');
            } else {
                showToast('❌ Неверный логин или пароль');
            }
        };

        window.switchAdminTab = function(tab) {
            document.querySelectorAll('#adminContent .tab[data-atab]').forEach(t => t.classList.toggle('active', t.dataset
                .atab === tab));
            document.getElementById('adminUsersTab').classList.toggle('hidden', tab !== 'users');
            document.getElementById('adminCreateTab').classList.toggle('hidden', tab !== 'create');
            if (tab === 'users') switchAdminUsersTab(adminUsersTab);
            if (tab === 'create') adminCreateFields();
        };

        window.switchAdminUsersTab = function(tab) {
            adminUsersTab = tab;
            document.querySelectorAll('#adminUsersTab .tab[data-utab]').forEach(t => t.classList.toggle('active', t.dataset
                .utab === tab));
            loadAdminUsers(tab);
        };

        function loadAdminUsers(type) {
            const container = document.getElementById('adminUsersList');
            let ref;

            if (type === 'cashiers') ref = db.ref('cashiers');
            else if (type === 'controllers') ref = db.ref('controllers');

            ref.on('value', (sn) => {
                const items = [];
                sn.forEach(child => items.push({ id: child.key, ...child.val() }));

                if (items.length === 0) {
                    container.innerHTML = '<div style="color:#555;padding:15px;text-align:center;">Нет сотрудников</div>';
                    return;
                }

                container.innerHTML = items.map(u => `
                    <div class="admin-user-item">
                        <div class="user-info">
                            <div class="name">${u.name || 'Без имени'}</div>
                            <div class="detail">${u.station ? '📍 ' + u.station : ''} ${u.login ? 'Логин: ' + u.login : ''}</div>
                        </div>
                        <button class="delete-btn" onclick="adminDeleteUser('${type}', '${u.id}')">✕ Удалить</button>
                    </div>
                `).join('');
            });
        }

        window.adminDeleteUser = function(type, id) {
            if (!confirm('Удалить сотрудника?')) return;
            let ref;
            if (type === 'cashiers') ref = db.ref('cashiers/' + id);
            else if (type === 'controllers') ref = db.ref('controllers/' + id);

            ref.remove().then(() => {
                showToast('✅ Сотрудник удалён');
                loadAdminUsers(type);
            });
        };

        window.adminCreateFields = function() {
            const container = document.getElementById('adminCreateFields');
            const type = document.getElementById('adminCreateType').value;

            if (type === 'cashier') {
                container.innerHTML = `
                    <div class="form-group"><label>ФИО</label><input type="text" id="adminCreateName" placeholder="Иванов Иван"></div>
                    <div class="form-group"><label>Станция</label>
                        <select id="adminCreateStation" style="width:100%;padding:8px 12px;border-radius:30px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#e8e8e8;font-size:0.85rem;outline:none;">
                            ${allStations.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group"><label>Логин</label><input type="text" id="adminCreateLogin" placeholder="Логин"></div>
                    <div class="form-group"><label>Пароль</label><input type="password" id="adminCreatePassword" placeholder="Пароль"></div>
                `;
            } else if (type === 'controller') {
                container.innerHTML = `
                    <div class="form-group"><label>ФИО</label><input type="text" id="adminCreateName" placeholder="Иванов Иван"></div>
                    <div class="form-group"><label>Логин</label><input type="text" id="adminCreateLogin" placeholder="Логин"></div>
                    <div class="form-group"><label>Пароль</label><input type="password" id="adminCreatePassword" placeholder="Пароль"></div>
                `;
            }
        };

        window.adminCreateUser = function() {
            const type = document.getElementById('adminCreateType').value;
            const name = document.getElementById('adminCreateName').value.trim();
            const login = document.getElementById('adminCreateLogin').value.trim();
            const password = document.getElementById('adminCreatePassword').value.trim();

            if (!name || !login || !password) {
                showToast('❌ Заполните все поля');
                return;
            }

            if (type === 'cashier') {
                const station = document.getElementById('adminCreateStation').value;
                if (!station) { showToast('❌ Выберите станцию'); return; }

                const id = 'CASH_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
                db.ref('cashiers/' + id).set({
                    id: id,
                    name: name,
                    station: station,
                    login: login,
                    password: password,
                    createdAt: Date.now()
                }).then(() => {
                    showToast('✅ Кассир ' + name + ' создан! Станция: ' + station);
                    switchAdminUsersTab('cashiers');
                });
            } else if (type === 'controller') {
                const id = 'CONT_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
                db.ref('controllers/' + id).set({
                    id: id,
                    name: name,
                    login: login,
                    password: password,
                    createdAt: Date.now()
                }).then(() => {
                    showToast('✅ Контролёр ' + name + ' создан!');
                    switchAdminUsersTab('controllers');
                });
            }
        };

        // =============================================
        // ===== ОБЩАЯ ФУНКЦИЯ СОЗДАНИЯ БИЛЕТА =====
        // =============================================
        function createTicketWithNumber(userId, name, phone, station, type, direction, ticketNumber) {
            const ticketId = 'TKT' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2, 4)
            .toUpperCase();
            const price = getTicketPrice(type);
            const expiresAt = Date.now() + 24 * 60 * 60 * 1000;

            db.ref('tickets/' + ticketId).set({
                id: ticketId,
                ticketNumber: ticketNumber,
                userId: userId,
                passengerName: name,
                phone: phone,
                station: station,
                type: type,
                direction: direction,
                price: price,
                status: 'active',
                createdAt: Date.now(),
                expiresAt: expiresAt
            }).then(() => {
                // Обновляем список у пассажира если он онлайн
                if (currentRole === 'passenger' && currentUser.id === userId) {
                    renderPassengerTickets();
                }
            });
        }

        function createTicket(userId, name, phone, station, type, direction) {
            const ticketNumber = generateTicketNumber();
            createTicketWithNumber(userId, name, phone, station, type, direction, ticketNumber);
            showToast('🎫 Билет №' + ticketNumber + ' создан!');
        }

        // =============================================
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        // =============================================
        console.log('🚆 ЖД Павелецкое направление');
        console.log('👑 Админ: логин 2203, пароль 2347');
        console.log('📍 Все станции по схеме Павелецкого направления');
        console.log('🎫 Контролёры теперь могут оформлять билеты!');

        setTimeout(() => adminCreateFields(), 100);
    </script>
