    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0a1a;
            min-height: 100vh;
            padding: 10px;
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .hidden {
            display: none !important;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 12px;
        }
        .header .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #f5a623;
        }
        .header .logo i {
            margin-right: 6px;
        }
        .header .user-badge {
            font-size: 0.7rem;
            color: #888;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 30px;
        }

        .role-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .role-btn {
            flex: 1;
            padding: 8px 4px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            color: #888;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.5rem;
            text-align: center;
            min-width: 45px;
        }
        .role-btn.active {
            border-color: #f5a623;
            color: #f5a623;
            background: rgba(245,166,35,0.1);
        }
        .role-btn i {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .auth-box {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .auth-box h3 {
            margin-bottom: 10px;
            color: #f5a623;
            font-size: 0.95rem;
        }
        .auth-box .form-group {
            margin-bottom: 8px;
        }
        .auth-box .form-group label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 3px;
        }
        .auth-box .form-group input,
        .auth-box .form-group select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.85rem;
            outline: none;
        }
        .auth-box .form-group select option {
            background: #1a1a2e;
            color: white;
        }
        .auth-box .form-group input:focus,
        .auth-box .form-group select:focus {
            border-color: #f5a623;
        }
        .auth-box .auth-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        .auth-box .auth-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .btn-primary {
            background: #f5a623;
            color: #1a1a2e;
        }
        .btn-success {
            background: #4CAF50;
            color: white;
        }
        .btn-danger {
            background: #ff4444;
            color: white;
        }
        .btn-info {
            background: #2196F3;
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: white;
        }
        .btn-admin {
            background: #6c1b7a;
            color: white;
        }

        .ticket-card {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #f5a623;
        }
        .ticket-card .ticket-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 0.8rem;
        }
        .ticket-card .ticket-number {
            color: #f5a623;
            font-size: 0.8rem;
        }
        .ticket-card .ticket-status {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 30px;
        }
        .status-active {
            background: #4CAF50;
            color: white;
        }
        .status-expired {
            background: #ff4444;
            color: white;
        }
        .ticket-card .ticket-info {
            font-size: 0.8rem;
            color: #aaa;
            margin: 4px 0;
        }
        .ticket-card .ticket-route {
            font-weight: bold;
            font-size: 1rem;
            color: #f5a623;
        }
        .ticket-card .qr-container {
            background: white;
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
            margin: 6px 0;
        }
        .ticket-card .qr-container canvas {
            display: block;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 6px 14px;
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            font-size: 0.7rem;
            color: #888;
            border: 1px solid transparent;
        }
        .tab.active {
            background: rgba(245,166,35,0.15);
            color: #f5a623;
            border-color: #f5a623;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            font-weight: 600;
            max-width: 90%;
            text-align: center;
            font-size: 0.8rem;
        }
        .toast.show {
            opacity: 1;
        }

        .scan-area {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px dashed rgba(255,255,255,0.08);
        }
        .scan-area input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.9rem;
            text-align: center;
            letter-spacing: 2px;
            font-family: monospace;
            outline: none;
        }
        .scan-area input:focus {
            border-color: #f5a623;
        }
        .scan-area .scan-result {
            margin-top: 8px;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        .scan-area .scan-result.success {
            background: rgba(76,175,80,0.15);
            border: 1px solid #4CAF50;
        }
        .scan-area .scan-result.error {
            background: rgba(255,68,68,0.15);
            border: 1px solid #ff4444;
        }

        .admin-user-item {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }
        .admin-user-item .user-info .name {
            font-weight: bold;
            color: #f5a623;
        }
        .admin-user-item .user-info .detail {
            color: #888;
            font-size: 0.65rem;
        }
        .admin-user-item .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .station-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.6rem;
            background: rgba(245,166,35,0.2);

        @media (max-width: 400px) {
            .role-btn {

                padding: 6px 3px;
            }

            }
            .ticket-card .qr-container canvas {
                width: 100px !important;
                height: 100px !important;
            }
        }
    </style>
</head>

                <div class="auth-actions">

                <div class="tabs" style="margin-bottom:10px;">
                    <button class="tab active" data-atab="users" onclick="switchAdminTab('users')">👥 Сотрудники</button>
                    <button class="tab" data-atab="create" onclick="switchAdminTab('create')">➕ Создать</button>
                </div>
                <div id="adminUsersTab">
                    <div class="tabs" style="margin-bottom:10px;">
                        <button class="tab active" data-utab="cashiers" onclick="switchAdminUsersTab('cashiers')">🎫 Кассиры</button>
                        <button class="tab" data-utab="controllers" onclick="switchAdminUsersTab('controllers')">🔍 Контролёры</button>

                        <div class="form-group">

                                <option value="cashier">🎫 Кассир</option>
                                <option value="controller">🔍 Контролёр</option>

                        <div id="adminCreateFields"></div>

                    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlZ5ZtyTXgtXxSJAx1jOxwhTrzlHRJmo",
            authDomain: "bk-cashier.firebaseapp.com",
            databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bk-cashier",
            storageBucket: "bk-cashier.firebasestorage.app",
            messagingSenderId: "385000840969",
            appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ========== СТАНЦИИ ==========
        const allStations = [
            'Павелецкий вокзал', 'Дербеневская', 'Тульская', 'Верхние Котлы',
            'Нагатинская', 'Варшавская', 'Чертаново', 'Котляково',
            'Бирюлейко-Тов.', 'Бирюлейко-Пасс.', 'Булатниково', 'Расторгуево',
            'Калинина', 'Ленинская', '32 км', 'Домодедово',
            'Взлётная', 'Востряково', 'Белые столбы', '52 км',
            'Барыбино', 'Вельяминово', 'Привалово', '328 км',
            '332 км', 'Малино', '341 км', 'Шугарово',
            '85 км', 'Жилёво', 'Ситенка', 'Ступино',
            'Акри', 'Белопесоцкий', 'Кашира', 'Тесна',
            'Ожерелье', '121 км', 'Пурлово', '131 км',
            'Топканово', '137 км', 'Богатищево', '146 км',
            'Коровино', '152 км', 'Узуново',
            'Авиационная', 'Космос', 'Аэропорт Домодедово',
            'Яганово', 'Сотниково', 'Кольчево'
        ];

        // ========== ПЕРЕМЕННЫЕ ==========
        let currentUser = { id: null, name: null, type: 'passenger', phone: null, role: null, station: null };
        let currentRole = 'passenger';
        let adminUsersTab = 'cashiers';
        let passengerTab = 'active';
        let controllerStation = 'Павелецкий вокзал';

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
        }

        function getTicketPrice(type) {
            if (type === 'social') return 0;
            if (type === 'student') return 50;
            return 100;
        }

        function getTypeName(type) {
            if (type === 'social') return 'Социальная карта';
            if (type === 'student') return 'Карта москвича/школьника';
            return 'Обычный';
        }

        function getDirectionName(dir) {
            return dir === 'roundtrip' ? 'Туда-обратно' : 'Туда';
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ РОЛЕЙ ==========
        window.switchRole = function(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.dataset.role === role));
            document.querySelectorAll('#passengerPanel, #cashierPanel, #controllerPanel, #adminPanel')
                .forEach(el => el.classList.add('hidden'));

            if (role === 'passenger') {
                document.getElementById('passengerPanel').classList.remove('hidden');
                document.getElementById('passengerContent').classList.add('hidden');
                document.getElementById('passengerAuth').classList.remove('hidden');
            } else if (role === 'cashier') {
                document.getElementById('cashierPanel').classList.remove('hidden');
                document.getElementById('cashierContent').classList.add('hidden');
                document.getElementById('cashierAuth').classList.remove('hidden');
            } else if (role === 'controller') {
                document.getElementById('controllerPanel').classList.remove('hidden');
                document.getElementById('controllerContent').classList.add('hidden');
                document.getElementById('controllerAuth').classList.remove('hidden');
            } else if (role === 'admin') {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminContent').classList.add('hidden');
                document.getElementById('adminAuth').classList.remove('hidden');
            }
        };

        // ========== ПАССАЖИР ==========
        window.passengerLogin = function() {
            const phone = document.getElementById('passengerPhone').value.trim();
            if (!phone) { showToast('Введите телефон'); return; }

            db.ref('users').orderByChild('phone').equalTo(phone).once('value', (sn) => {
                if (sn.exists()) {
                    sn.forEach(child => {
                        currentUser.id = child.key;
                        currentUser.name = child.val().name;
                        currentUser.phone = child.val().phone;
                        currentUser.type = 'passenger';
                    });
                    showToast('Добро пожаловать, ' + currentUser.name + '!');
                    enterPassengerMode();
                } else {
                    showToast('Пользователь не найден. Зарегистрируйтесь.');
                }
            });
        };

        window.passengerRegister = function() {
            const phone = document.getElementById('passengerPhone').value.trim();
            const name = document.getElementById('passengerName').value.trim();
            if (!phone || !name) { showToast('Заполните все поля'); return; }

            const userId = 'user_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
            db.ref('users/' + userId).set({
                id: userId,
                name: name,
                phone: phone,
                type: 'passenger',
                createdAt: Date.now()
            }).then(() => {
                currentUser = { id: userId, name: name, phone: phone, type: 'passenger' };
                showToast('Регистрация успешна!');
                enterPassengerMode();
            });
        };

        function enterPassengerMode() {
            document.getElementById('passengerAuth').classList.add('hidden');
            document.getElementById('passengerContent').classList.remove('hidden');
            document.getElementById('userNameDisplay').textContent = currentUser.name + ' 🎫';
            renderPassengerTickets();
        }

        window.passengerBuyTicket = function() {
            if (!currentUser.id) { showToast('Войдите как пассажир'); return; }
            const station = document.getElementById('passengerStation').value;
            const type = document.getElementById('passengerTicketType').value;
            const direction = document.getElementById('passengerDirection').value;

            createTicket(currentUser.id, currentUser.name, currentUser.phone, station, type, direction);
        };

        window.switchPassengerTab = function(tab) {
            passengerTab = tab;
            document.querySelectorAll('#passengerContent .tab[data-ptab]').forEach(t => t.classList.toggle('active', t
                .dataset.ptab === tab));
            renderPassengerTickets();
        };

        function renderPassengerTickets() {
            const container = document.getElementById('passengerTickets');
            db.ref('tickets').orderByChild('userId').equalTo(currentUser.id).on('value', (sn) => {
                const tickets = [];
                sn.forEach(child => tickets.push({ id: child.key, ...child.val() }));
                tickets.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                const filtered = passengerTab === 'active' ?
                    tickets.filter(t => t.status === 'active') :
                    tickets;

                if (filtered.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:#555;padding:20px;">Нет билетов</div>';
                    return;
                }

                container.innerHTML = filtered.map(t => `
                    <div class="ticket-card">
                        <div class="ticket-header">
                            <span class="ticket-number">🎫 ${t.id}</span>
                            <span class="ticket-status ${t.status === 'active' ? 'status-active' : 'status-expired'}">
                                ${t.status === 'active' ? '✅ Действителен' : '❌ Недействителен'}
                            </span>
                        </div>
                        <div class="ticket-route">🚆 ${t.station}</div>
                        <div class="ticket-info">🧑 ${t.passengerName}</div>
                        <div class="ticket-info">📱 ${t.phone}</div>
                        <div class="ticket-info">🎫 ${getTypeName(t.type)}</div>
                        <div class="ticket-info">🔄 ${getDirectionName(t.direction)}</div>
                        <div class="ticket-info">💰 ${t.price} ₽</div>
                        <div class="ticket-info">⏳ Действует до: ${new Date(t.expiresAt).toLocaleString()}</div>
                        <div class="qr-container" id="qr_${t.id}"></div>
                        <script>
                            setTimeout(() => {
                                try {
                                    new QRCode(document.getElementById('qr_${t.id}'), {
                                        text: '${t.id}',
                                        width: 120,
                                        height: 120
                                    });
                                } catch(e) {}
                            }, 100);
                        <\/script>
                    </div>
                `).join('');
            });
        }

        // ========== КАССИР ==========
        window.cashierLogin = function() {
            const station = document.getElementById('cashierStationSelect').value;
            const login = document.getElementById('cashierLogin').value.trim();
            const password = document.getElementById('cashierPassword').value.trim();

            if (!station || !login || !password) { showToast('Заполните все поля'); return; }

            db.ref('cashiers').orderByChild('login').equalTo(login).once('value', (sn) => {
                if (sn.exists()) {
                    let found = false;
                    sn.forEach(child => {
                        const data = child.val();
                        if (data.password === password && data.station === station) {
                            currentUser = {
                                id: child.key,
                                name: data.name,
                                type: 'cashier',
                                role: 'cashier',
                                station: data.station
                            };
                            found = true;
                            showToast('👋 Добро пожаловать, ' + data.name + '!');
                            document.getElementById('cashierAuth').classList.add('hidden');
                            document.getElementById('cashierContent').classList.remove('hidden');
                            document.getElementById('userNameDisplay').textContent = data.name + ' 🎫 ' + data.station;
                            loadCashierTickets();
                        }
                    });
                    if (!found) showToast('Неверный логин, пароль или станция');
                } else {
                    showToast('Кассир не найден');
                }
            });
        };

        window.cashierSellTicket = function() {
            const phone = document.getElementById('cashierPhone').value.trim();
            const name = document.getElementById('cashierName').value.trim();
            const station = document.getElementById('cashierStation').value;
            const type = document.getElementById('cashierTicketType').value;
            const direction = document.getElementById('cashierDirection').value;

            if (!phone || !name) { showToast('Введите телефон и имя пассажира'); return; }

            db.ref('users').orderByChild('phone').equalTo(phone).once('value', (sn) => {
                let userId;
                if (sn.exists()) {
                    sn.forEach(child => { userId = child.key; });
                    db.ref('users/' + userId + '/name').set(name);
                } else {
                    userId = 'user_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
                    db.ref('users/' + userId).set({
                        id: userId,
                        name: name,
                        phone: phone,
                        type: 'passenger',
                        createdAt: Date.now()
                    });
                }
                createTicket(userId, name, phone, station, type, direction);
                showToast('✅ Билет продан!');
                loadCashierTickets();
            });
        };

        function loadCashierTickets() {
            const container = document.getElementById('cashierTickets');
            db.ref('tickets').orderByChild('createdAt').limitToLast(20).on('value', (sn) => {
                const tickets = [];
                sn.forEach(child => tickets.push({ id: child.key, ...child.val() }));
                tickets.reverse();

                if (tickets.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:#555;padding:15px;">Нет билетов</div>';
                    return;
                }

                container.innerHTML = tickets.map(t => `
                    <div class="ticket-card">
                        <div class="ticket-header">
                            <span class="ticket-number">🎫 ${t.id}</span>
                            <span class="ticket-status ${t.status === 'active' ? 'status-active' : 'status-expired'}">
                                ${t.status === 'active' ? '✅ Действителен' : '❌ Недействителен'}
                            </span>
                        </div>
                        <div class="ticket-route">🚆 ${t.station}</div>
                        <div class="ticket-info">🧑 ${t.passengerName}</div>
                        <div class="ticket-info">📱 ${t.phone}</div>
                        <div class="ticket-info">🎫 ${getTypeName(t.type)}</div>
                        <div class="ticket-info">🔄 ${getDirectionName(t.direction)}</div>
                        <div class="ticket-info">💰 ${t.price} ₽</div>
                    </div>
                `).join('');
            });
        }

        // ========== КОНТРОЛЁР ==========
        window.controllerLogin = function() {
            const login = document.getElementById('controllerLogin').value.trim();
            const password = document.getElementById('controllerPassword').value.trim();

            if (!login || !password) { showToast('Заполните поля'); return; }

            db.ref('controllers').orderByChild('login').equalTo(login).once('value', (sn) => {
                if (sn.exists()) {
                    let found = false;
                    sn.forEach(child => {
                        const data = child.val();
                        if (data.password === password) {
                            currentUser = {
                                id: child.key,
                                name: data.name,
                                type: 'controller',
                                role: 'controller'
                            };
                            found = true;
                            showToast('👋 Добро пожаловать, ' + data.name + '!');
                            document.getElementById('controllerAuth').classList.add('hidden');
                            document.getElementById('controllerContent').classList.remove('hidden');
                            document.getElementById('userNameDisplay').textContent = data.name + ' 🔍';
                            loadControllerTickets();
                        }
                    });
                    if (!found) showToast('Неверный пароль');
                } else {
                    showToast('Контролёр не найден');
                }
            });
        };

        window.controllerSetStation = function() {
            const station = prompt('Введите конечную станцию (например: Узуново):');
            if (station && allStations.includes(station)) {
                controllerStation = station;
                showToast('📍 Конечная станция: ' + station);
            } else if (station) {
                showToast('❌ Станция не найдена в списке');
            }
        };

        window.controllerScanTicket = function() {
            document.getElementById('controllerScanInput').focus();
            showToast('📷 Отсканируйте QR-код или введите код вручную');
        };

        window.controllerCheckTicket = function(code) {
            const resultDiv = document.getElementById('controllerScanResult');
            if (!code || code.length < 5) {
                resultDiv.style.display = 'none';
                return;
            }

            db.ref('tickets/' + code).once('value', (sn) => {
                const ticket = sn.val();
                if (!ticket) {
                    resultDiv.style.display = 'block';
                    resultDiv.className = 'scan-result error';
                    resultDiv.innerHTML = '❌ Билет не найден';
                    return;
                }

                const now = Date.now();
                const isValid = ticket.status === 'active' && ticket.expiresAt > now;

                resultDiv.style.display = 'block';
                resultDiv.className = 'scan-result ' + (isValid ? 'success' : 'error');
                resultDiv.innerHTML = `
                    <div style="font-weight:bold;">${isValid ? '✅ БИЛЕТ ДЕЙСТВИТЕЛЕН' : '❌ БИЛЕТ НЕДЕЙСТВИТЕЛЕН'}</div>
                    <div>🎫 ${ticket.id}</div>
                    <div>🚆 ${ticket.station}</div>
                    <div>🧑 ${ticket.passengerName}</div>
                    <div>📱 ${ticket.phone}</div>
                    <div>🎫 ${getTypeName(ticket.type)}</div>
                    <div>🔄 ${getDirectionName(ticket.direction)}</div>
                    <div>💰 ${ticket.price} ₽</div>
                    <div>⏳ Действует до: ${new Date(ticket.expiresAt).toLocaleString()}</div>
                    ${!isValid ? '<div style="color:#ff4444;">Срок действия истёк</div>' : ''}
                    ${controllerStation ? '<div style="color:#4CAF50;">📍 Конечная: ' + controllerStation + '</div>' : ''}
                `;
            });
        };

        function loadControllerTickets() {
            // Контролёр видит последние билеты для проверки
        }

        // ========== СОЗДАНИЕ БИЛЕТА ==========
        function createTicket(userId, name, phone, station, type, direction) {
            const ticketId = 'TKT' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2, 4)
            .toUpperCase();
            const price = getTicketPrice(type);
            const expiresAt = Date.now() + 24 * 60 * 60 * 1000; // 24 часа

            db.ref('tickets/' + ticketId).set({
                id: ticketId,
                userId: userId,
                passengerName: name,
                phone: phone,
                station: station,
                type: type,
                direction: direction,
                price: price,
                status: 'active',
                createdAt: Date.now(),
                expiresAt: expiresAt
            }).then(() => {
                showToast('🎫 Билет ' + ticketId + ' создан!');
                if (currentRole === 'passenger') renderPassengerTickets();
            });
        }

        // ========== АДМИН ==========
        window.adminLogin = function() {
            const login = document.getElementById('adminLogin').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if (login === '2203' && password === '2347') {
                showToast('👋 Добро пожаловать, администратор!');
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                document.getElementById('userNameDisplay').textContent = 'Администратор 🔐';
                switchAdminTab('users');
                switchAdminUsersTab('cashiers');
            } else {
                showToast('❌ Неверный логин или пароль');
            }
        };

        window.switchAdminTab = function(tab) {
            document.querySelectorAll('#adminContent .tab[data-atab]').forEach(t => t.classList.toggle('active', t.dataset
                .atab === tab));
            document.getElementById('adminUsersTab').classList.toggle('hidden', tab !== 'users');
            document.getElementById('adminCreateTab').classList.toggle('hidden', tab !== 'create');
            if (tab === 'users') switchAdminUsersTab(adminUsersTab);
            if (tab === 'create') adminCreateFields();
        };

        window.switchAdminUsersTab = function(tab) {
            adminUsersTab = tab;
            document.querySelectorAll('#adminUsersTab .tab[data-utab]').forEach(t => t.classList.toggle('active', t.dataset
                .utab === tab));
            loadAdminUsers(tab);
        };

        function loadAdminUsers(type) {
            const container = document.getElementById('adminUsersList');
            let ref;

            if (type === 'cashiers') ref = db.ref('cashiers');
            else if (type === 'controllers') ref = db.ref('controllers');

            ref.on('value', (sn) => {
                const items = [];
                sn.forEach(child => items.push({ id: child.key, ...child.val() }));

                if (items.length === 0) {
                    container.innerHTML = '<div style="color:#555;padding:15px;text-align:center;">Нет сотрудников</div>';
                    return;
                }

                container.innerHTML = items.map(u => `
                    <div class="admin-user-item">
                        <div class="user-info">
                            <div class="name">${u.name || 'Без имени'}</div>
                            <div class="detail">${u.station ? '📍 ' + u.station : ''} ${u.login ? 'Логин: ' + u.login : ''}</div>
                        </div>
                        <button class="delete-btn" onclick="adminDeleteUser('${type}', '${u.id}')">✕ Удалить</button>
                    </div>
                `).join('');
            });
        }

        window.adminDeleteUser = function(type, id) {
            if (!confirm('Удалить сотрудника?')) return;
            let ref;
            if (type === 'cashiers') ref = db.ref('cashiers/' + id);
            else if (type === 'controllers') ref = db.ref('controllers/' + id);

            ref.remove().then(() => {
                showToast('✅ Сотрудник удалён');
                loadAdminUsers(type);
            });
        };

        window.adminCreateFields = function() {
            const container = document.getElementById('adminCreateFields');
            const type = document.getElementById('adminCreateType').value;

            if (type === 'cashier') {
                container.innerHTML = `
                    <div class="form-group"><label>ФИО</label><input type="text" id="adminCreateName" placeholder="Иванов Иван"></div>
                    <div class="form-group"><label>Станция</label>
                        <select id="adminCreateStation" style="width:100%;padding:8px 12px;border-radius:30px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);color:white;font-size:0.85rem;outline:none;">
                            ${allStations.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group"><label>Логин</label><input type="text" id="adminCreateLogin" placeholder="Логин"></div>
                    <div class="form-group"><label>Пароль</label><input type="password" id="adminCreatePassword" placeholder="Пароль"></div>
                `;
            } else if (type === 'controller') {
                container.innerHTML = `
                    <div class="form-group"><label>ФИО</label><input type="text" id="adminCreateName" placeholder="Иванов Иван"></div>
                    <div class="form-group"><label>Логин</label><input type="text" id="adminCreateLogin" placeholder="Логин"></div>
                    <div class="form-group"><label>Пароль</label><input type="password" id="adminCreatePassword" placeholder="Пароль"></div>
                `;
            }
        };

        window.adminCreateUser = function() {
            const type = document.getElementById('adminCreateType').value;
            const name = document.getElementById('adminCreateName').value.trim();
            const login = document.getElementById('adminCreateLogin').value.trim();
            const password = document.getElementById('adminCreatePassword').value.trim();

            if (!name || !login || !password) {
                showToast('❌ Заполните все поля');
                return;
            }

            if (type === 'cashier') {
                const station = document.getElementById('adminCreateStation').value;
                if (!station) { showToast('❌ Выберите станцию'); return; }

                const id = 'CASH_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
                db.ref('cashiers/' + id).set({
                    id: id,
                    name: name,
                    station: station,
                    login: login,
                    password: password,
                    createdAt: Date.now()
                }).then(() => {
                    showToast('✅ Кассир ' + name + ' создан! Станция: ' + station);
                    switchAdminUsersTab('cashiers');
                });
            } else if (type === 'controller') {
                const id = 'CONT_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
                db.ref('controllers/' + id).set({
                    id: id,
                    name: name,
                    login: login,
                    password: password,
                    createdAt: Date.now()
                }).then(() => {
                    showToast('✅ Контролёр ' + name + ' создан!');
                    switchAdminUsersTab('controllers');
                });
            }
        };

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        console.log('🚆 ЖД Павелецкое направление');
        console.log('👑 Админ: логин 2203, пароль 2347');
        console.log('📍 Все станции по схеме Павелецкого направления');

        // Заполняем поля админа при создании
        setTimeout(() => adminCreateFields(), 100);
    </script>
</body>
</html>
