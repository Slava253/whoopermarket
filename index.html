<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>🛍️ WHOPPER MARKET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        body {
            background: #0f0f1a;
            min-height: 100vh;
            padding: 10px;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .hidden {
            display: none !important;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 12px;
        }
        .header .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #f5a623;
        }
        .header .logo i {
            margin-right: 6px;
        }
        .header .user-badge {
            font-size: 0.7rem;
            color: #888;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 30px;
        }
        .header .user-badge i {
            color: #f5a623;
            margin-right: 4px;
        }

        .role-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .role-btn {
            flex: 1;
            padding: 6px 4px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            color: #888;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.55rem;
            transition: 0.2s;
            text-align: center;
            min-width: 45px;
            -webkit-tap-highlight-color: transparent;
        }
        .role-btn.active {
            border-color: #f5a623;
            color: #f5a623;
            background: rgba(245,166,35,0.1);
        }
        .role-btn:active {
            transform: scale(0.95);
        }
        .role-btn i {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .auth-box {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .auth-box h3 {
            margin-bottom: 10px;
            color: #f5a623;
            font-size: 0.95rem;
        }
        .auth-box .form-group {
            margin-bottom: 8px;
        }
        .auth-box .form-group label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 3px;
        }
        .auth-box .form-group input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.85rem;
            outline: none;
            -webkit-appearance: none;
        }
        .auth-box .form-group input:focus {
            border-color: #f5a623;
        }
        .auth-box .auth-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        .auth-box .auth-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary {
            background: #f5a623;
            color: #1a1a2e;
        }
        .btn-success {
            background: #4CAF50;
            color: white;
        }
        .btn-danger {
            background: #ff4444;
            color: white;
        }
        .btn-info {
            background: #2196F3;
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: white;
        }
        .btn-purple {
            background: #9c27b0;
            color: white;
        }
        .btn-warning {
            background: #ff9800;
            color: #1a1a2e;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }
        .product-card {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        .product-card:active {
            transform: scale(0.97);
        }
        .product-card .name {
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 3px;
        }
        .product-card .price {
            color: #f5a623;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .product-card .add-btn {
            margin-top: 6px;
            background: #f5a623;
            color: #1a1a2e;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.65rem;
            -webkit-tap-highlight-color: transparent;
        }
        .product-card .age-18 {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff4444;
            color: white;
            font-size: 0.45rem;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 10px;
        }
        .product-card .product-photo {
            width: 100%;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 4px;
            background: rgba(255,255,255,0.05);
        }

        .cart-panel {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cart-panel .title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #f5a623;
            font-size: 0.9rem;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.8rem;
        }
        .cart-total {
            font-weight: bold;
            font-size: 1rem;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
        }
        .cart-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .cart-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            min-width: 70px;
            font-size: 0.75rem;
            -webkit-tap-highlight-color: transparent;
        }

        .order-card {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #f5a623;
        }
        .order-card .order-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 0.8rem;
        }
        .order-card .order-number {
            color: #f5a623;
            font-size: 0.8rem;
            word-break: break-all;
        }
        .order-card .order-status {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 30px;
        }
        .status-waiting {
            background: #ff9800;
            color: white;
        }
        .status-ready {
            background: #4CAF50;
            color: white;
        }
        .status-delivered {
            background: #999;
            color: white;
        }
        .status-return {
            background: #ff4444;
            color: white;
        }
        .order-card .order-items-list {
            font-size: 0.75rem;
            color: #aaa;
            margin: 4px 0;
            padding: 4px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .order-card .order-items-list .item-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0;
        }
        .order-card .order-items-list .item-photo {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            object-fit: cover;
            background: rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .order-card .order-items-list .item-name {
            flex: 1;
            font-size: 0.75rem;
        }
        .order-card .order-total {
            font-weight: bold;
            font-size: 0.85rem;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .order-card .order-code {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f5a623;
            font-family: monospace;
            letter-spacing: 8px;
            background: rgba(255,255,255,0.08);
            padding: 10px;
            border-radius: 12px;
            margin: 6px 0;
            text-align: center;
            border: 2px solid rgba(245,166,35,0.25);
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 6px 14px;
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            font-size: 0.7rem;
            color: #888;
            border: 1px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }
        .tab.active {
            background: rgba(245,166,35,0.15);
            color: #f5a623;
            border-color: #f5a623;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            font-weight: 600;
            max-width: 90%;
            text-align: center;
            font-size: 0.8rem;
        }
        .toast.show {
            opacity: 1;
        }

        .wallet {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .wallet .amount {
            font-size: 1.1rem;
            font-weight: bold;
            color: #f5a623;
        }

        .scan-area {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px dashed rgba(255,255,255,0.08);
        }
        .scan-area input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.9rem;
            text-align: center;
            letter-spacing: 2px;
            font-family: monospace;
            outline: none;
            -webkit-appearance: none;
        }
        .scan-area input:focus {
            border-color: #f5a623;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
            max-width: 420px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .modal-content h3 {
            color: #f5a623;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .modal-content .close-modal {
            float: right;
            background: none;
            border: none;
            color: #888;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .modal-content .rating-stars {
            font-size: 1.8rem;
            color: #555;
            cursor: pointer;
            display: flex;
            gap: 4px;
            justify-content: center;
            margin: 8px 0;
        }
        .modal-content .rating-stars .star.active {
            color: #f5a623;
        }
        .modal-content .review-text {
            width: 100%;
            padding: 10px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.85rem;
            outline: none;
            font-family: inherit;
            min-height: 60px;
            resize: vertical;
            margin: 8px 0;
            -webkit-appearance: none;
        }
        .modal-content .review-text:focus {
            border-color: #f5a623;
        }
        .modal-content .file-input-wrapper input[type="file"] {
            display: none;
        }
        .modal-content .file-input-wrapper .file-label {
            background: rgba(255,255,255,0.05);
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            border: 1px dashed #555;
            font-size: 0.75rem;
            color: #aaa;
            display: inline-block;
            -webkit-tap-highlight-color: transparent;
        }
        .modal-content .preview-photo {
            max-width: 80px;
            max-height: 80px;
            border-radius: 10px;
            object-fit: cover;
            margin: 6px 0;
        }
        .reviews-list {
            margin-top: 8px;
            max-height: 160px;
            overflow-y: auto;
        }
        .reviews-list .review-item {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 6px;
        }
        .reviews-list .review-item .review-user {
            font-weight: bold;
            color: #f5a623;
            font-size: 0.75rem;
        }
        .reviews-list .review-item .review-rating {
            color: #f5a623;
            font-size: 0.75rem;
        }
        .reviews-list .review-item .review-text {
            color: #aaa;
            font-size: 0.8rem;
            margin-top: 3px;
        }
        .reviews-list .review-item .review-photo {
            max-width: 80px;
            max-height: 80px;
            border-radius: 6px;
            margin-top: 4px;
            object-fit: cover;
        }

        .order-actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .order-actions button {
            padding: 4px 10px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 0.65rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .delivery-select {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
        }
        .delivery-select select {
            width: 100%;
            padding: 8px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.85rem;
            outline: none;
            -webkit-appearance: none;
        }
        .delivery-address {
            margin-top: 6px;
            padding: 6px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            font-size: 0.75rem;
            color: #aaa;
            display: none;
        }
        .delivery-address.show {
            display: block;
        }

        @media (max-width: 400px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            .role-btn {
                font-size: 0.5rem;
                padding: 4px 3px;
            }
            .role-btn i {
                font-size: 0.8rem;
            }
            .order-card .order-code {
                font-size: 1.3rem;
                letter-spacing: 4px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="container" id="app">
        <div class="header">
            <div class="logo"><i class="fas fa-store"></i> WHOPPER</div>
            <div class="user-badge" id="userBadge"><i class="fas fa-user"></i> <span id="userNameDisplay">Гость</span></div>
        </div>

        <div class="role-selector" id="roleSelector">
            <button class="role-btn active" data-role="client" onclick="switchRole('client')">
                <i class="fas fa-user"></i> Клиент
            </button>
            <button class="role-btn" data-role="seller" onclick="switchRole('seller')">
                <i class="fas fa-store-alt"></i> Продавец
            </button>
            <button class="role-btn" data-role="pvz" onclick="switchRole('pvz')">
                <i class="fas fa-warehouse"></i> ПВЗ
            </button>
            <button class="role-btn" data-role="courier" onclick="switchRole('courier')">
                <i class="fas fa-truck"></i> Курьер
            </button>
            <button class="role-btn" data-role="support" onclick="switchRole('support')">
                <i class="fas fa-headset"></i> Поддержка
            </button>
        </div>

        <!-- ========== КЛИЕНТ (сокращён) ========== -->
        <div id="clientPanel">
            <div id="clientAuth" class="auth-box">
                <h3>👤 Вход</h3>
                <div class="form-group"><label>Телефон</label><input type="tel" id="clientPhone" placeholder="+7 999 999 99 99"></div>
                <div class="form-group"><label>Имя</label><input type="text" id="clientName" placeholder="Ваше имя"></div>
                <div class="auth-actions">
                    <button class="btn-primary" onclick="clientLogin()">Войти</button>
                    <button class="btn-success" onclick="clientRegister()">Регистрация</button>
                </div>
            </div>
            <div id="clientContent" class="hidden">
                <div class="wallet" onclick="openDepositModal('client')">
                    <span><i class="fas fa-wallet"></i> Кошелёк</span>
                    <span class="amount" id="clientWallet">0 ₽</span>
                </div>
                <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;margin-bottom:12px;text-align:center;color:#555;">
                    📱 Клиентский раздел (заказы, корзина, поддержка)
                    <button class="btn-primary" onclick="switchRole('client')" style="margin-top:8px;width:100%;padding:8px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">🔄 Обновить</button>
                </div>
            </div>
        </div>

        <!-- ========== ПРОДАВЕЦ (сокращён) ========== -->
        <div id="sellerPanel" class="hidden">
            <div id="sellerAuth" class="auth-box">
                <h3>🏪 Вход продавца</h3>
                <div class="form-group"><label>ФИО</label><input type="text" id="sellerFullName" placeholder="Иванов Иван"></div>
                <div class="form-group"><label>Магазин</label><input type="text" id="sellerShopName" placeholder="Мой магазин"></div>
                <div class="form-group"><label>Телефон</label><input type="tel" id="sellerPhone" placeholder="+7 999 999 99 99"></div>
                <div class="form-group"><label>Логин</label><input type="text" id="sellerLogin" placeholder="Логин"></div>
                <div class="form-group"><label>Пароль</label><input type="password" id="sellerPassword" placeholder="Пароль"></div>
                <div class="auth-actions">
                    <button class="btn-primary" onclick="sellerLogin()">Войти</button>
                    <button class="btn-success" onclick="sellerRegister()">Регистрация</button>
                </div>
            </div>
            <div id="sellerContent" class="hidden">
                <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;text-align:center;color:#555;">
                    🏪 Раздел продавца
                </div>
            </div>
        </div>

        <!-- ========== ПВЗ (ОСНОВНОЙ) ========== -->
        <div id="pvzPanel" class="hidden">
            <div id="pvzAuth" class="auth-box">
                <h3>🏪 Вход ПВЗ</h3>
                <div class="form-group"><label>Номер ПВЗ</label><input type="number" id="pvzLogin" placeholder="Например: 17"></div>
                <div class="form-group"><label>Пароль</label><input type="password" id="pvzPassword" placeholder="Пароль"></div>
                <div class="form-group" id="pvzRegisterFields" style="display:none;"><label>Адрес ПВЗ</label><input type="text" id="pvzAddress" placeholder="Адрес ПВЗ"></div>
                <div class="auth-actions">
                    <button class="btn-primary" onclick="pvzLogin()">Войти</button>
                    <button class="btn-success" onclick="pvzRegister()">Регистрация</button>
                </div>
            </div>
            <div id="pvzContent" class="hidden">
                <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;">
                    <button class="btn-primary" onclick="pvzAction('receive')">📥 Приём</button>
                    <button class="btn-success" onclick="pvzAction('issue')">📤 Выдача</button>
                    <button class="btn-info" onclick="pvzAction('courier')">🚚 Курьер</button>
                </div>

                <div class="scan-area">
                    <h4 style="color:#f5a623;margin-bottom:6px;font-size:0.85rem;">🔑 Поиск по коду клиента</h4>
                    <input type="text" id="pvzScanInput" placeholder="Введите 6-значный код" maxlength="6" oninput="pvzScanQR(this.value)">
                    <div id="pvzScanResult" style="margin-top:6px;"></div>
                </div>

                <div id="pvzOrdersContainer">
                    <h4 style="color:#f5a623;margin:10px 0 8px;font-size:0.85rem;">📋 Заказы ПВЗ №<span id="pvzNumberDisplay">--</span></h4>
                    <div id="pvzOrders"></div>
                </div>
            </div>
        </div>

        <!-- ========== КУРЬЕР ========== -->
        <div id="courierPanel" class="hidden">
            <div id="courierAuth" class="auth-box">
                <h3>🚚 Вход курьера</h3>

        window.pvzAction = function(action) {
            const container = document.getElementById('pvzOrders');
            const ordersRef = db.ref('orders');

            if (action === 'receive') {
                ordersRef.orderByChild('status').equalTo('to_pvz').on('value', renderPVZOrders);
            } else if (action === 'issue') {
                ordersRef.orderByChild('status').equalTo('ready').on('value', renderPVZOrders);
            } else if (action === 'courier') {
                ordersRef.orderByChild('status').equalTo('with_courier').on('value', renderPVZOrders);
            }
        };

        function renderPVZOrders(sn) {
            const container = document.getElementById('pvzOrders');
            const orders = [];
            sn.forEach(child => orders.push({ id: child.key, ...child.val() }));

            // Фильтруем по номеру ПВЗ
            const filtered = orders.filter(o => o.pvzNumber === currentUser.pvzNumber);

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#555;padding:20px;font-size:0.85rem;">📭 Нет заказов для этого ПВЗ</div>';
                return;
            }

            container.innerHTML = filtered.map(o => `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-number">🆔 ${o.id}</span>
                        <span class="order-status ${getStatusClass(o.status)}">${getStatusText(o.status)}</span>
                    </div>
                    <div class="order-items-list">
                        ${o.items.map(i => `
                            <div class="item-row">
                                ${i.photo ? `<img src="${i.photo}" class="item-photo" loading="lazy" onerror="this.style.display='none'">` : ''}
                                <span class="item-name">${i.name}${i.adult ? ' 🔞' : ''}</span>
                                <span class="item-qty">x${i.qty}</span>
                                <span style="color:#f5a623;">${(i.price * i.qty).toLocaleString()} ₽</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="order-total">💰 ${o.total.toLocaleString()} ₽</div>
                    <div style="font-size:0.75rem;color:#888;">👤 ${o.userName}</div>
                    <div class="order-code">🔑 ${o.code}</div>
                    ${o.hasAdult && !o.adultConfirmed ? `<div style="color:#ff4444;font-weight:bold;font-size:0.7rem;">🔞 Требуется подтверждение 18+</div>` : ''}
                    <div class="order-actions">
                        ${o.status === 'to_pvz' ? `<button class="btn-success" onclick="pvzReady('${o.id}')">✅ Готов к выдаче</button>` : ''}
                        ${o.status === 'ready' && o.hasAdult && !o.adultConfirmed ? `<button class="btn-purple" onclick="pvzConfirmAdult('${o.id}')">🔞 Подтвердить 18+</button>` : ''}
                        ${o.status === 'ready' ? `<button class="btn-primary" onclick="pvzIssue('${o.id}')">📤 Выдать</button>` : ''}
                        ${o.status === 'with_courier' ? `<button class="btn-info" onclick="pvzGiveCourier('${o.id}')">🚚 Передать курьеру</button>` : ''}
                        ${o.status === 'ready' ? `<button class="btn-danger" onclick="pvzReturn('${o.id}')">🔄 Возврат</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        window.pvzConfirmAdult = function(orderId) {
            if (!confirm('🔞 Подтвердить, что клиенту есть 18+?')) return;
            db.ref('orders/' + orderId).update({ adultConfirmed: true });

            pvzAction('issue');

        window.pvzReady = function(orderId) {
            db.ref('orders/' + orderId).update({ status: 'ready' });
            showToast('✅ Заказ готов к выдаче');
            pvzAction('receive');
        };

        window.pvzIssue = function(orderId) {
            const code = document.getElementById('pvzScanInput').value.trim();
            if (!code) {
                const manualCode = prompt('Введите код клиента:');
                if (!manualCode) return;
                verifyAndIssue(orderId, manualCode);
            } else {
                verifyAndIssue(orderId, code);
                document.getElementById('pvzScanInput').value = '';
            }
        };

        function verifyAndIssue(orderId, code) {
            db.ref('orders/' + orderId).once('value', (sn) => {
                const order = sn.val();
                if (!order) { showToast('❌ Заказ не найден'); return; }

                if (order.code === code) {
                    if (order.hasAdult && !order.adultConfirmed) {
                        if (!confirm('🔞 Товар 18+. Подтвердить выдачу?')) return;
                        db.ref('orders/' + orderId).update({ adultConfirmed: true });
                    }
                    db.ref('orders/' + orderId).update({ status: 'delivered' });
                    showToast('✅ Заказ выдан!');
                    document.getElementById('pvzScanResult').innerHTML = '';
                    pvzAction('issue');
                } else {
                    showToast('❌ Неверный код!');
                    document.getElementById('pvzScanResult').innerHTML = '<div style="color:#ff4444;">❌ Неверный код</div>';
                }
            });
        }

        window.pvzScanQR = function(input) {
            const result = document.getElementById('pvzScanResult');
            if (!input || input.length < 6) {
                result.innerHTML = '';
                return;
            }

            db.ref('orders').orderByChild('code').equalTo(input).once('value', (sn) => {
                let found = false;
                sn.forEach(child => {
                    const order = child.val();

                        found = true;
                        let adultWarning = '';

                            adultWarning =
                                '<div style="color:#ff4444;font-weight:bold;margin-top:5px;">🔞 Требуется подтверждение 18+</div>';
                        }
                        result.innerHTML = `
                            <div style="background:rgba(76,175,80,0.15);padding:12px;border-radius:12px;border:1px solid #4CAF50;">
                                <div style="color:#4CAF50;font-weight:bold;">✅ Заказ найден!</div>
                                <div>👤 ${order.userName}</div>
                                <div>📦 ${order.items.map(i => `${i.name} x${i.qty}${i.adult ? ' 🔞' : ''}`).join(', ')}</div>
                                <div style="font-weight:bold;">${order.total} ₽</div>
                                <div style="font-size:0.8rem;color:#888;">Код: ${order.code}</div>
                                ${adultWarning}
                                ${order.status === 'ready' ? 
                                    `<button onclick="verifyAndIssue('${order.id}', '${order.code}')" style="margin-top:8px;padding:8px 20px;border-radius:30px;border:none;background:#4CAF50;color:white;font-weight:bold;cursor:pointer;">📤 Выдать</button>` : 
                                    `<div style="color:#ff9800;font-size:0.8rem;">Статус: ${getStatusText(order.status)}</div>`
                                }
                            </div>
                        `;
                    }
                });
                if (!found) {
                    result.innerHTML = '<div style="color:#ff4444;">❌ Заказ не найден или не для этого ПВЗ</div>';
                }
            });
        };

                            document.getElementById('userNameDisplay').textContent = currentUser.name + ' 🎧';
                        }
                    });
                    if (!found) showToast('❌ Неверный пароль');
                } else {
                    showToast('❌ Оператор не найден');
                }
            });
        };

        // ========== СТАТУСЫ ==========
        function getStatusText(status) {
            const map = {
                'to_pvz': '🚚 Едет на ПВЗ',
                'ready': '✅ Готов к выдаче',
                'delivered': '📦 Выдан',
                'to_courier': '⏳ Ожидает курьера',
                'with_courier': '🚚 У курьера',
                'courier_arrived': '🚪 Курьер прибыл',
                'return': '🔄 Возврат'
            };
            return map[status] || status;
        }

        function getStatusClass(status) {
            const map = {
                'to_pvz': 'status-waiting',
                'ready': 'status-ready',
                'delivered': 'status-delivered',
                'to_courier': 'status-waiting',
                'with_courier': 'status-courier',
                'courier_arrived': 'status-courier',
                'return': 'status-return'
            };
            return map[status] || 'status-waiting';
        }

        // ========== ЗАГРУЗКА ПВЗ И КУРЬЕРОВ ==========
        function loadPVZList() {
            db.ref('pvz').on('value', (sn) => {
                allPVZ = [];
                sn.forEach(child => {
                    const data = child.val();
                    allPVZ.push({
                        id: child.key,
                        number: data.number,
                        address: data.address || 'Адрес не указан'
                    });
                });
            });
        }

        function loadCouriers() {
            db.ref('couriers').on('value', (sn) => {
                allCouriers = [];
                sn.forEach(child => {
                    const data = child.val();
                    allCouriers.push({
                        id: child.key,
                        name: data.name,
                        login: data.login,
                        activeOrders: data.activeOrders || 0
                    });
                });
            });
        }

        // ========== ПОПОЛНЕНИЕ ==========
        window.openDepositModal = function(target) {
            if (!currentUser.id) { showToast('❌ Войдите'); return; }
            depositTarget = target;
            document.getElementById('depositCurrentBalance').textContent = (currentUser.wallet || 0).toLocaleString() + ' ₽';
            document.getElementById('depositCustomAmount').value = '';
            document.querySelectorAll('.deposit-amounts button').forEach(b => b.style.borderColor = 'rgba(255,255,255,0.08)');
            // упрощённое пополнение
            const amount = 1000;
            const newBalance = (currentUser.wallet || 0) + amount;
            let path = '';
            if (depositTarget === 'client') { path = 'users/' + currentUser.id + '/wallet'; } else if (depositTarget ===
                'seller') { path = 'sellers/' + currentUser.id + '/wallet'; } else if (depositTarget === 'courier') {
                path = 'couriers/' + currentUser.id + '/wallet'; }
            db.ref(path).set(newBalance).then(() => {
                currentUser.wallet = newBalance;
                showToast(`✅ +${amount} ₽`);
                document.getElementById('depositCurrentBalance').textContent = newBalance.toLocaleString() + ' ₽';
                setTimeout(() => document.getElementById('depositModal').classList.add('hidden'), 500);
            });
        };

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        console.log('🛍️ WHOPPER MARKET - ПВЗ ИСПРАВЛЕН');
        loadPVZList();
        loadCouriers();
    </script>
</body>
</html>
