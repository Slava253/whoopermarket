<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WHOPPER - Админ</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#0f0f1a; color:#fff; padding:10px; min-height:100vh; }
        .container { max-width:500px; margin:0 auto; }
        .hidden { display:none !important; }
        .header { display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:10px 14px; border-radius:16px; margin-bottom:12px; }
        .logo { font-size:1.2rem; font-weight:bold; color:#f5a623; }
        .user-badge { font-size:0.7rem; color:#888; background:rgba(255,255,255,0.05); padding:4px 12px; border-radius:30px; }
        .user-badge button { background:none; border:none; color:#f5a623; cursor:pointer; margin-left:8px; }
        .btn { padding:8px 16px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; font-size:0.8rem; transition:0.15s; }
        .btn-primary { background:#f5a623; color:#1a1a2e; }
        .btn-success { background:#4CAF50; color:#fff; }
        .btn-danger { background:#ef4444; color:#fff; }
        .btn-info { background:#2196F3; color:#fff; }
        .btn-block { width:100%; padding:10px; }
        .form-group { margin-bottom:10px; }
        .form-group label { display:block; font-size:0.7rem; color:#888; margin-bottom:4px; }
        .form-group input { width:100%; padding:10px 14px; border-radius:30px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.05); color:#fff; font-size:0.85rem; outline:none; }
        .auth-box { background:rgba(255,255,255,0.03); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.05); }
        .auth-box h3 { margin-bottom:12px; color:#f5a623; font-size:1rem; }
        .auth-actions { display:flex; gap:8px; margin-top:12px; }
        .auth-actions button { flex:1; padding:10px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; font-size:0.8rem; }
        .pvz-item { background:rgba(255,255,255,0.03); border-radius:12px; padding:10px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(255,255,255,0.05); }
        .pvz-item .pvz-info { font-size:0.85rem; }
        .pvz-item .pvz-info .pvz-address { color:#888; font-size:0.75rem; }
        .courier-item { background:rgba(255,255,255,0.03); border-radius:12px; padding:10px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(255,255,255,0.05); }
        .courier-item .courier-info { font-size:0.85rem; }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 24px; border-radius:40px; z-index:999; opacity:0; transition:0.3s; pointer-events:none; font-weight:600; max-width:90%; text-align:center; font-size:0.85rem; }
        .toast.show { opacity:1; }
        .admin-pvz-list { max-height:200px; overflow-y:auto; }
        .tabs { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
        .tab { padding:8px 16px; border-radius:30px; background:rgba(255,255,255,0.05); cursor:pointer; font-size:0.75rem; color:#888; border:1px solid transparent; transition:0.15s; }
        .tab.active { background:rgba(245,166,35,0.15); color:#f5a623; border-color:#f5a623; }
        @media (max-width:400px) { .pvz-item { padding:8px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">👑 WHOPPER</div>
        <div class="user-badge">👤 <span id="userNameDisplay">Гость</span> <button onclick="logout()">Выйти</button></div>
    </div>

    <div id="authBox" class="auth-box">
        <h3>👑 Вход администратора</h3>
        <div class="form-group"><label>Логин</label><input type="text" id="adminLogin" placeholder="Логин"></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="adminPass" placeholder="Пароль"></div>
        <div class="auth-actions"><button class="btn-primary" onclick="login()">Войти</button></div>
    </div>

    <div id="mainContent" class="hidden">
        <!-- ВКЛАДКИ -->
        <div class="tabs">
            <button class="tab active" data-tab="pvz" onclick="switchAdminTab('pvz')">🏪 ПВЗ</button>
            <button class="tab" data-tab="courier" onclick="switchAdminTab('courier')">🚚 Курьеры</button>
            <button class="tab" data-tab="support" onclick="switchAdminTab('support')">💬 Поддержка</button>
            <button class="tab" data-tab="stats" onclick="switchAdminTab('stats')">📊 Статистика</button>
        </div>
        
        <!-- ПВЗ -->
        <div id="tabPvz">
            <h4 style="color:#f5a623;margin-bottom:10px;">🏪 Управление ПВЗ</h4>
            <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;margin-bottom:12px;">
                <div class="form-group"><label>Код ПВЗ</label><input type="text" id="adminPvzCode" placeholder="Код ПВЗ"></div>
                <div class="form-group"><label>Адрес ПВЗ</label><input type="text" id="adminPvzAddress" placeholder="Адрес"></div>
                <button class="btn-success btn-block" onclick="addPvz()">➕ Добавить ПВЗ</button>
            </div>
            <div id="pvzList" class="admin-pvz-list"></div>
        </div>
        
        <!-- КУРЬЕРЫ -->
        <div id="tabCourier" class="hidden">
            <h4 style="color:#f5a623;margin-bottom:10px;">🚚 Управление курьерами</h4>
            <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;margin-bottom:12px;">
                <div class="form-group"><label>Логин курьера</label><input type="text" id="adminCourierLogin" placeholder="Логин"></div>
                <div class="form-group"><label>Пароль</label><input type="text" id="adminCourierPass" placeholder="Пароль"></div>
                <div class="form-group"><label>Имя курьера</label><input type="text" id="adminCourierName" placeholder="Имя курьера"></div>
                <button class="btn-info btn-block" onclick="addCourier()">➕ Добавить курьера</button>
            </div>
            <div id="courierList" style="max-height:200px;overflow-y:auto;"></div>
        </div>
        
        <!-- ПОДДЕРЖКА -->
        <div id="tabSupport" class="hidden">
            <h4 style="color:#f5a623;margin-bottom:10px;">💬 Управление поддержкой</h4>
            <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;margin-bottom:12px;">
                <div class="form-group"><label>Логин сотрудника</label><input type="text" id="adminSupportLogin" placeholder="Логин"></div>
                <div class="form-group"><label>Пароль</label><input type="text" id="adminSupportPass" placeholder="Пароль"></div>
                <button class="btn-info btn-block" onclick="addSupport()">➕ Добавить сотрудника</button>
            </div>
            <div id="supportList" style="max-height:200px;overflow-y:auto;"></div>
        </div>
        
        <!-- СТАТИСТИКА -->
        <div id="tabStats" class="hidden">
            <h4 style="color:#f5a623;margin-bottom:10px;">📊 Статистика</h4>
            <div id="stats" style="background:rgba(255,255,255,0.03);border-radius:14px;padding:12px;"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBlZ5ZtyTXgtXxSJAx1jOxwhTrzlHRJmo",
    authDomain: "bk-cashier.firebaseapp.com",
    databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bk-cashier",
    storageBucket: "bk-cashier.firebasestorage.app",
    messagingSenderId: "385000840969",
    appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
db.goOnline();

let currentUser = null;

function showToast(msg, err = false) {
    let t = document.getElementById('toast');
    if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
    t.textContent = msg;
    t.style.background = err ? '#ef4444' : '#1a1a2e';
    t.classList.add('show');
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
}

function login() {
    const login = document.getElementById('adminLogin').value.trim();
    const pass = document.getElementById('adminPass').value.trim();
    if (login === '2347' && pass === '2203') {
        currentUser = { login: '2347', name: 'Администратор' };
        document.getElementById('authBox').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        document.getElementById('userNameDisplay').textContent = '👑 Администратор';
        showToast('👑 Добро пожаловать, Администратор!');
        loadPvz();
        loadCouriers();
        loadSupport();
        loadStats();
    } else { showToast('❌ Неверный логин или пароль', true); }
}

function logout() {
    currentUser = null;
    document.getElementById('authBox').classList.remove('hidden');
    document.getElementById('mainContent').classList.add('hidden');
    document.getElementById('userNameDisplay').textContent = 'Гость';
    showToast('👋 Выход выполнен');
}

function switchAdminTab(tab) {
    document.querySelectorAll('#mainContent .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    ['tabPvz', 'tabCourier', 'tabSupport', 'tabStats'].forEach(id => {
        document.getElementById(id).classList.toggle('hidden', id !== 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
    });
    if (tab === 'pvz') loadPvz();
    if (tab === 'courier') loadCouriers();
    if (tab === 'support') loadSupport();
    if (tab === 'stats') loadStats();
}

// ========== ПВЗ ==========
function loadPvz() {
    const container = document.getElementById('pvzList');
    db.ref('pvz').on('value', (sn) => {
        const pvzs = [];
        sn.forEach(child => { pvzs.push({ id: child.key, ...child.val() }); });
        if (!pvzs.length) { container.innerHTML = '<div style="color:#555;padding:8px;">Нет ПВЗ</div>'; return; }
        container.innerHTML = pvzs.map(p => `
            <div class="pvz-item">
                <div class="pvz-info">
                    <div style="font-weight:bold;">🏪 ПВЗ ${p.code}</div>
                    <div class="pvz-address">📍 ${p.address || 'Адрес не указан'}</div>
                </div>
                <button class="btn-danger" onclick="deletePvz('${p.id}')" style="padding:4px 10px;border:none;border-radius:30px;cursor:pointer;font-size:0.7rem;">🗑</button>
            </div>
        `).join('');
    });
}

function addPvz() {
    const code = document.getElementById('adminPvzCode').value.trim();
    const address = document.getElementById('adminPvzAddress').value.trim();
    if (!code) { showToast('❌ Введите код ПВЗ', true); return; }
    if (!address) { showToast('❌ Введите адрес ПВЗ', true); return; }
    db.ref('pvz').orderByChild('code').equalTo(code).once('value', (sn) => {
        if (sn.exists()) { showToast('❌ ПВЗ с таким кодом уже существует', true); return; }
        db.ref('pvz').push().set({ code, address }).then(() => {
            showToast('✅ ПВЗ добавлен!');
            document.getElementById('adminPvzCode').value = '';
            document.getElementById('adminPvzAddress').value = '';
            loadPvz();
        });
    });
}

function deletePvz(id) {
    if (!confirm('Удалить ПВЗ?')) return;
    db.ref('pvz/' + id).remove().then(() => { showToast('🗑️ ПВЗ удалён'); loadPvz(); });
}

// ========== КУРЬЕРЫ ==========
function loadCouriers() {
    const container = document.getElementById('courierList');
    db.ref('couriers').on('value', (sn) => {
        const couriers = [];
        sn.forEach(child => { couriers.push({ id: child.key, ...child.val() }); });
        if (!couriers.length) { container.innerHTML = '<div style="color:#555;padding:8px;">Нет курьеров</div>'; return; }
        container.innerHTML = couriers.map(c => `
            <div class="courier-item">
                <div class="courier-info">
                    <div style="font-weight:bold;">🚚 ${c.name}</div>
                    <div style="color:#888;font-size:0.7rem;">Логин: ${c.login}</div>
                </div>
                <button class="btn-danger" onclick="deleteCourier('${c.id}')" style="padding:4px 10px;border:none;border-radius:30px;cursor:pointer;font-size:0.7rem;">🗑</button>
            </div>
        `).join('');
    });
}

function addCourier() {
    const login = document.getElementById('adminCourierLogin').value.trim();
    const pass = document.getElementById('adminCourierPass').value.trim();
    const name = document.getElementById('adminCourierName').value.trim();
    if (!login || !pass || !name) { showToast('❌ Заполните все поля', true); return; }
    db.ref('couriers').orderByChild('login').equalTo(login).once('value', (sn) => {
        if (sn.exists()) { showToast('❌ Логин занят', true); return; }
        db.ref('couriers').push().set({ login, password: pass, name }).then(() => {
            showToast('✅ Курьер добавлен!');
            document.getElementById('adminCourierLogin').value = '';
            document.getElementById('adminCourierPass').value = '';
            document.getElementById('adminCourierName').value = '';
            loadCouriers();
        });
    });
}

function deleteCourier(id) {
    if (!confirm('Удалить курьера?')) return;
    db.ref('couriers/' + id).remove().then(() => { showToast('🗑️ Курьер удалён'); loadCouriers(); });
}

// ========== ПОДДЕРЖКА ==========
function loadSupport() {
    const container = document.getElementById('supportList');
    db.ref('support_users').on('value', (sn) => {
        const users = [];
        sn.forEach(child => { users.push({ id: child.key, ...child.val() }); });
        if (!users.length) { container.innerHTML = '<div style="color:#555;padding:8px;">Нет сотрудников поддержки</div>'; return; }
        container.innerHTML = users.map(u => `
            <div class="pvz-item">
                <div class="pvz-info">
                    <div style="font-weight:bold;">💬 ${u.login}</div>
                    <div style="color:#888;font-size:0.7rem;">${u.name}</div>
                </div>
                <button class="btn-danger" onclick="deleteSupport('${u.id}')" style="padding:4px 10px;border:none;border-radius:30px;cursor:pointer;font-size:0.7rem;">🗑</button>
            </div>
        `).join('');
    });
}

function addSupport() {
    const login = document.getElementById('adminSupportLogin').value.trim();
    const pass = document.getElementById('adminSupportPass').value.trim();
    if (!login || !pass) { showToast('❌ Заполните все поля', true); return; }
    db.ref('support_users').orderByChild('login').equalTo(login).once('value', (sn) => {
        if (sn.exists()) { showToast('❌ Логин занят', true); return; }
        db.ref('support_users').push().set({ login, password: pass, name: 'Оператор ' + login }).then(() => {
            showToast('✅ Сотрудник поддержки добавлен!');
            document.getElementById('adminSupportLogin').value = '';
            document.getElementById('adminSupportPass').value = '';
            loadSupport();
        });
    });
}

function deleteSupport(id) {
    if (!confirm('Удалить сотрудника поддержки?')) return;
    db.ref('support_users/' + id).remove().then(() => { showToast('🗑️ Сотрудник удалён'); loadSupport(); });
}

// ========== СТАТИСТИКА ==========
function loadStats() {
    const container = document.getElementById('stats');
    db.ref('orders').once('value', (sn) => {
        let total = 0, collecting = 0, ready = 0, delivered = 0, returns = 0;
        let courierToPvz = 0, courierOut = 0, courierArrived = 0;
        sn.forEach(child => {
            const o = child.val();
            total++;
            if (o.status === 'collecting' || o.status === 'pending') collecting++;
            else if (o.status === 'ready') ready++;
            else if (o.status === 'delivered') delivered++;
            else if (o.status === 'return') returns++;
            else if (o.status === 'courier_to_pvz') courierToPvz++;
            else if (o.status === 'courier_out') courierOut++;
            else if (o.status === 'courier_arrived') courierArrived++;
        });
        container.innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.5rem;color:#f5a623;">${total}</div>
                    <div style="font-size:0.7rem;color:#888;">Всего</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.5rem;color:#ff9800;">${collecting}</div>
                    <div style="font-size:0.7rem;color:#888;">Собираются</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.5rem;color:#4CAF50;">${ready}</div>
                    <div style="font-size:0.7rem;color:#888;">Готовы</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.5rem;color:#999;">${delivered}</div>
                    <div style="font-size:0.7rem;color:#888;">Выдано</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;grid-column:span 2;">
                    <div style="font-size:1.5rem;color:#ef4444;">${returns}</div>
                    <div style="font-size:0.7rem;color:#888;">Возвратов</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.2rem;color:#2196F3;">${courierToPvz}</div>
                    <div style="font-size:0.6rem;color:#888;">Курьер едет в ПВЗ</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.2rem;color:#2196F3;">${courierOut}</div>
                    <div style="font-size:0.6rem;color:#888;">Курьер выехал</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;grid-column:span 2;">
                    <div style="font-size:1.2rem;color:#4CAF50;">${courierArrived}</div>
                    <div style="font-size:0.6rem;color:#888;">Курьер прибыл</div>
                </div>
            </div>
        `;
    });
}

console.log('👑 WHOPPER - Администратор загружен');
</script>
</body>
</html>
