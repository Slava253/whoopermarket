<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WHOPPER - Админ</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/utils.js"></script>
    <style>
        .back-link { display:inline-block; color:#f5a623; text-decoration:none; font-size:0.8rem; margin-bottom:10px; }
        .back-link:hover { text-decoration:underline; }
    </style>
</head>
<body>
<div class="container">
    <a href="../index.html" class="back-link">← На главную</a>
    
    <div class="header">
        <div class="logo">👑 WHOPPER</div>
        <div class="user-badge">👤 <span id="userNameDisplay">Гость</span> <button onclick="logout()">Выйти</button></div>
    </div>

    <div id="authBox" class="auth-box">
        <h3>👑 Вход администратора</h3>
        <div class="form-group"><label>Логин</label><input type="text" id="adminLogin" placeholder="Логин"></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="adminPass" placeholder="Пароль"></div>
        <div class="auth-actions"><button class="btn-primary" onclick="login()">Войти</button></div>
    </div>

    <div id="mainContent" class="hidden">
        <h4 style="color:#f5a623;margin-bottom:10px;">🏪 Управление ПВЗ</h4>
        <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;margin-bottom:12px;">
            <div class="form-group"><label>Код ПВЗ</label><input type="text" id="adminPvzCode" placeholder="Код ПВЗ"></div>
            <div class="form-group"><label>Адрес ПВЗ</label><input type="text" id="adminPvzAddress" placeholder="Адрес"></div>
            <button class="btn-success btn-block" onclick="addPvz()">➕ Добавить ПВЗ</button>
        </div>
        <div id="pvzList" class="admin-pvz-list"></div>
        
        <h4 style="color:#f5a623;margin:12px 0 8px;">💬 Управление поддержкой</h4>
        <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;margin-bottom:12px;">
            <div class="form-group"><label>Логин сотрудника</label><input type="text" id="adminSupportLogin" placeholder="Логин"></div>
            <div class="form-group"><label>Пароль</label><input type="text" id="adminSupportPass" placeholder="Пароль"></div>
            <button class="btn-info btn-block" onclick="addSupport()">➕ Добавить сотрудника поддержки</button>
        </div>
        <div id="supportList" style="max-height:150px;overflow-y:auto;"></div>
        
        <h4 style="color:#f5a623;margin:12px 0 8px;">📊 Статистика</h4>
        <div id="stats" style="background:rgba(255,255,255,0.03);border-radius:14px;padding:12px;"></div>
    </div>
</div>

<script>
let currentUser = null;

function login() {
    const login = document.getElementById('adminLogin').value.trim();
    const pass = document.getElementById('adminPass').value.trim();
    if (login === '2347' && pass === '2203') {
        currentUser = { login: '2347', name: 'Администратор' };
        document.getElementById('authBox').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        document.getElementById('userNameDisplay').textContent = '👑 Администратор';
        showToast('👑 Добро пожаловать, Администратор!');
        loadPvz();
        loadSupport();
        loadStats();
    } else {
        showToast('❌ Неверный логин или пароль');
    }
}

function logout() {
    currentUser = null;
    document.getElementById('authBox').classList.remove('hidden');
    document.getElementById('mainContent').classList.add('hidden');
    document.getElementById('userNameDisplay').textContent = 'Гость';
    showToast('👋 Выход выполнен');
}

function loadPvz() {
    const container = document.getElementById('pvzList');
    db.ref('pvz').on('value', (sn) => {
        const pvzs = [];
        sn.forEach(child => { pvzs.push({ id: child.key, ...child.val() }); });
        if (!pvzs.length) { container.innerHTML = '<div style="color:#555;padding:8px;">Нет ПВЗ</div>'; return; }
        container.innerHTML = pvzs.map(p => `
            <div class="pvz-item">
                <div class="pvz-info">
                    <div style="font-weight:bold;">🏪 ПВЗ ${p.code}</div>
                    <div class="pvz-address">📍 ${p.address || 'Адрес не указан'}</div>
                </div>
                <button class="btn-danger" onclick="deletePvz('${p.id}')" style="padding:4px 10px;border:none;border-radius:30px;cursor:pointer;font-size:0.7rem;">🗑</button>
            </div>
        `).join('');
    });
}

function addPvz() {
    const code = document.getElementById('adminPvzCode').value.trim();
    const address = document.getElementById('adminPvzAddress').value.trim();
    if (!code) { showToast('❌ Введите код ПВЗ'); return; }
    if (!address) { showToast('❌ Введите адрес ПВЗ'); return; }
    db.ref('pvz').orderByChild('code').equalTo(code).once('value', (sn) => {
        if (sn.exists()) { showToast('❌ ПВЗ с таким кодом уже существует'); return; }
        db.ref('pvz').push().set({ code, address }).then(() => {
            showToast('✅ ПВЗ добавлен!');
            document.getElementById('adminPvzCode').value = '';
            document.getElementById('adminPvzAddress').value = '';
            loadPvz();
        });
    });
}

function deletePvz(pvzId) {
    if (!confirm('Удалить ПВЗ?')) return;
    db.ref('pvz/' + pvzId).remove().then(() => { showToast('🗑️ ПВЗ удалён'); loadPvz(); });
}

function loadSupport() {
    const container = document.getElementById('supportList');
    db.ref('support_users').on('value', (sn) => {
        const users = [];
        sn.forEach(child => { users.push({ id: child.key, ...child.val() }); });
        if (!users.length) { container.innerHTML = '<div style="color:#555;padding:8px;">Нет сотрудников поддержки</div>'; return; }
        container.innerHTML = users.map(u => `
            <div class="pvz-item">
                <div class="pvz-info">
                    <div style="font-weight:bold;">💬 ${u.login}</div>
                    <div style="color:#888;font-size:0.7rem;">${u.name}</div>
                </div>
                <button class="btn-danger" onclick="deleteSupport('${u.id}')" style="padding:4px 10px;border:none;border-radius:30px;cursor:pointer;font-size:0.7rem;">🗑</button>
            </div>
        `).join('');
    });
}

function addSupport() {
    const login = document.getElementById('adminSupportLogin').value.trim();
    const pass = document.getElementById('adminSupportPass').value.trim();
    if (!login || !pass) { showToast('❌ Заполните все поля'); return; }
    db.ref('support_users').orderByChild('login').equalTo(login).once('value', (sn) => {
        if (sn.exists()) { showToast('❌ Логин занят'); return; }
        db.ref('support_users').push().set({ login, password: pass, name: 'Оператор ' + login }).then(() => {
            showToast('✅ Сотрудник поддержки добавлен!');
            document.getElementById('adminSupportLogin').value = '';
            document.getElementById('adminSupportPass').value = '';
            loadSupport();
        });
    });
}

function deleteSupport(userId) {
    if (!confirm('Удалить сотрудника поддержки?')) return;
    db.ref('support_users/' + userId).remove().then(() => { showToast('🗑️ Сотрудник удалён'); loadSupport(); });
}

function loadStats() {
    const container = document.getElementById('stats');
    db.ref('orders').once('value', (sn) => {
        let total = 0, collecting = 0, sent = 0, in_pvz = 0, ready = 0, delivered = 0, returns = 0;
        sn.forEach(child => {
            const order = child.val();
            total++;
            if (order.status === 'collecting' || order.status === 'pending') collecting++;
            else if (order.status === 'sent') sent++;
            else if (order.status === 'in_pvz') in_pvz++;
            else if (order.status === 'ready') ready++;
            else if (order.status === 'delivered') delivered++;
            else if (order.status === 'return') returns++;
        });
        container.innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.5rem;color:#f5a623;">${total}</div>
                    <div style="font-size:0.7rem;color:#888;">Всего</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.5rem;color:#ff9800;">${collecting}</div>
                    <div style="font-size:0.7rem;color:#888;">Собираются</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.5rem;color:#2196F3;">${sent}</div>
                    <div style="font-size:0.7rem;color:#888;">Отправлены</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.5rem;color:#4CAF50;">${in_pvz}</div>
                    <div style="font-size:0.7rem;color:#888;">В ПВЗ</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.5rem;color:#4CAF50;">${ready}</div>
                    <div style="font-size:0.7rem;color:#888;">Готовы</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;">
                    <div style="font-size:1.5rem;color:#999;">${delivered}</div>
                    <div style="font-size:0.7rem;color:#888;">Выдано</div>
                </div>
                <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:10px;text-align:center;grid-column:span 2;">
                    <div style="font-size:1.5rem;color:#ef4444;">${returns}</div>
                    <div style="font-size:0.7rem;color:#888;">Возвратов</div>
                </div>
            </div>
        `;
    });
}

console.log('👑 WHOPPER - Администратор');
</script>
</body>
</html>
