<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WHOPPER - ПВЗ</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#0f0f1a; color:#fff; padding:10px; min-height:100vh; }
        .container { max-width:500px; margin:0 auto; }
        .hidden { display:none !important; }
        .header { display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:10px 14px; border-radius:16px; margin-bottom:12px; }
        .logo { font-size:1.2rem; font-weight:bold; color:#f5a623; }
        .user-badge { font-size:0.7rem; color:#888; background:rgba(255,255,255,0.05); padding:4px 12px; border-radius:30px; }
        .user-badge button { background:none; border:none; color:#f5a623; cursor:pointer; margin-left:8px; }
        .btn { padding:8px 16px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; font-size:0.8rem; }
        .btn-primary { background:#f5a623; color:#1a1a2e; }
        .btn-success { background:#4CAF50; color:#fff; }
        .btn-danger { background:#ef4444; color:#fff; }
        .btn-info { background:#2196F3; color:#fff; }
        .btn-warning { background:#ff9800; color:#fff; }
        .btn-purple { background:#9c27b0; color:#fff; }
        .btn-cyan { background:#00bcd4; color:#fff; }
        .btn-block { width:100%; padding:10px; }
        .form-group { margin-bottom:10px; }
        .form-group label { display:block; font-size:0.7rem; color:#888; margin-bottom:4px; }
        .form-group input { width:100%; padding:10px 14px; border-radius:30px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.05); color:#fff; font-size:0.85rem; outline:none; }
        .auth-box { background:rgba(255,255,255,0.03); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.05); }
        .auth-box h3 { margin-bottom:12px; color:#f5a623; font-size:1rem; }
        .auth-actions { display:flex; gap:8px; margin-top:12px; }
        .auth-actions button { flex:1; padding:10px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; font-size:0.8rem; }
        .order-card { background:rgba(255,255,255,0.04); border-radius:14px; padding:14px; margin-bottom:10px; border-left:4px solid #f5a623; }
        .order-card .order-header { display:flex; justify-content:space-between; font-weight:bold; margin-bottom:6px; font-size:0.85rem; flex-wrap:wrap; gap:4px; }
        .order-card .order-number { color:#f5a623; font-size:0.85rem; }
        .order-card .order-status { font-size:0.65rem; padding:3px 12px; border-radius:30px; }
        .status-collecting { background:#ff9800; color:#fff; }
        .status-ready { background:#4CAF50; color:#fff; }
        .status-delivered { background:#999; color:#fff; }
        .status-return { background:#ef4444; color:#fff; }
        .order-card .order-code { font-size:1.6rem; font-weight:bold; color:#f5a623; font-family:monospace; letter-spacing:6px; background:rgba(255,255,255,0.08); padding:10px; border-radius:12px; margin:8px 0; text-align:center; border:2px solid rgba(245,166,35,0.25); }
        .order-card .order-pickup-number { font-size:1.3rem; font-weight:bold; color:#4CAF50; font-family:monospace; background:rgba(76,175,80,0.15); padding:6px 16px; border-radius:10px; display:inline-block; border:2px solid #4CAF50; letter-spacing:4px; }
        .order-delivery-info { font-size:0.8rem; color:#888; margin:4px 0; }
        .order-delivery-info span { color:#f5a623; }
        .order-item { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.03); }
        .order-item .item-info { flex:1; font-size:0.85rem; }
        .scanner-container { background:#000; border-radius:16px; overflow:hidden; position:relative; min-height:300px; display:flex; align-items:center; justify-content:center; margin:12px 0; }
        .scanner-container video { width:100%; display:block; }
        .scanner-overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:200px; height:200px; border:2px solid #f5a623; border-radius:12px; box-shadow:0 0 0 4000px rgba(0,0,0,0.4); pointer-events:none; }
        .scanner-input-area { display:flex; gap:8px; margin:10px 0; }
        .scanner-input-area input { flex:1; padding:10px 16px; border-radius:30px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.05); color:#fff; font-size:0.85rem; outline:none; }
        .scanner-input-area button { padding:10px 20px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; }
        .scanned-order { background:rgba(76,175,80,0.1); border:1px solid #4CAF50; border-radius:12px; padding:12px; margin-top:10px; }
        .scanned-order .label { color:#888; font-size:0.75rem; }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 24px; border-radius:40px; z-index:999; opacity:0; transition:0.3s; pointer-events:none; font-weight:600; max-width:90%; text-align:center; font-size:0.85rem; }
        .toast.show { opacity:1; }
        .scanned-package { background:rgba(76,175,80,0.1); border:2px solid #4CAF50; border-radius:12px; padding:12px; margin:10px 0; }
        .scanned-package .code-display { font-size:2rem; font-weight:bold; color:#f5a623; font-family:monospace; letter-spacing:8px; text-align:center; background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; }
        .scanner-buttons { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0; }
        .scanner-buttons button { flex:1; padding:10px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; font-size:0.75rem; min-width:100px; }
        @media (max-width:400px) { .scanner-overlay { width:150px; height:150px; } .scanner-buttons button { min-width:80px; font-size:0.65rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">📦 WHOPPER ПВЗ</div>
        <div class="user-badge">👤 <span id="userNameDisplay">Гость</span> <button onclick="logout()">Выйти</button></div>
    </div>

    <div id="authBox" class="auth-box">
        <h3>🏪 Вход ПВЗ</h3>
        <div class="form-group"><label>Код ПВЗ</label><input type="text" id="pvzCode" placeholder="Введите код ПВЗ"></div>
        <div class="auth-actions"><button class="btn-primary" onclick="login()">Войти</button></div>
    </div>

    <div id="mainContent" class="hidden">
        <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;">
            <button class="btn-warning" onclick="viewOrders('collecting')">📥 Сборка</button>
            <button class="btn-success" onclick="viewOrders('ready')">📤 Выдача</button>
            <button class="btn-danger" onclick="viewOrders('return')">🔄 Возвраты</button>
        </div>
        
        <div style="background:rgba(245,166,35,0.1);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid #f5a623;">
            <h4 style="color:#f5a623;font-size:0.85rem;margin-bottom:8px;">📦 Сканировать упаковку</h4>
            <p style="color:#888;font-size:0.75rem;margin-bottom:8px;">Отсканируйте QR-код на упаковке товара</p>
            
            <!-- ВЫБОР СКАНЕРА -->
            <div class="scanner-buttons">
                <button class="btn-cyan" onclick="startPackageScanner('camera')">📷 Камера</button>
                <button class="btn-purple" onclick="startPackageScanner('physical')">🔍 Сканер</button>
            </div>
            
            <div id="packageScanner" class="scanner-container hidden"><div class="scanner-overlay"></div></div>
            <button class="btn-danger btn-block" onclick="stopPackageScanner()" style="margin-top:6px;">⏹ Остановить</button>
            
            <!-- Для физического сканера -->
            <div class="scanner-input-area" id="physicalScannerInput">
                <input type="text" id="physicalScanInput" placeholder="Отсканируйте физическим сканером..." oninput="physicalScanHandler(this.value)">
                <button class="btn-info" onclick="physicalScanHandler(document.getElementById('physicalScanInput').value)">🔍</button>
            </div>
            
            <div id="scannedPackageResult"></div>
        </div>
        
        <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;margin-bottom:12px;">
            <h4 style="color:#f5a623;font-size:0.85rem;margin-bottom:8px;">📷 Сканировать заказ</h4>
            
            <div class="scanner-buttons">
                <button class="btn-cyan" onclick="startOrderScanner('camera')">📷 Камера</button>
                <button class="btn-purple" onclick="startOrderScanner('physical')">🔍 Сканер</button>
            </div>
            
            <div id="orderScanner" class="scanner-container hidden"><div class="scanner-overlay"></div></div>
            <button class="btn-danger btn-block" onclick="stopOrderScanner()" style="margin-top:6px;">⏹ Остановить</button>
            
            <div class="scanner-input-area">
                <input type="text" id="scannerInput" placeholder="Введите код вручную..." oninput="manualSearch(this.value)">
                <button class="btn-info" onclick="manualSearch(document.getElementById('scannerInput').value)">🔍</button>
            </div>
            <div id="scannedResult"></div>
        </div>
        
        <div class="scan-area">
            <h4 style="color:#f5a623;font-size:0.85rem;">🔑 Поиск по коду</h4>
            <input type="text" id="pvzSearch" placeholder="6-значный код" maxlength="6" oninput="findOrder(this.value)">
            <div id="pvzResult" style="margin-top:6px;"></div>
        </div>
        
        <div id="ordersList"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBlZ5ZtyTXgtXxSJAx1jOxwhTrzlHRJmo",
    authDomain: "bk-cashier.firebaseapp.com",
    databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bk-cashier",
    storageBucket: "bk-cashier.firebasestorage.app",
    messagingSenderId: "385000840969",
    appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;
let currentPvzCode = null;
let orderScanner = null;
let packageScanner = null;
let scannedOrderId = null;
let usedPickupNumbers = [];
let isPhysicalScanner = false;

function showToast(msg, err = false) {
    let t = document.getElementById('toast');
    if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
    t.textContent = msg;
    t.style.background = err ? '#ef4444' : '#1a1a2e';
    t.classList.add('show');
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
}

function login() {
    const code = document.getElementById('pvzCode').value.trim();
    if (!code) { showToast('❌ Введите код ПВЗ', true); return; }
    db.ref('pvz').orderByChild('code').equalTo(code).once('value', (sn) => {
        if (sn.exists()) {
            let found = false;
            sn.forEach(child => {
                const p = child.val();
                if (p.code === code) {
                    currentPvzCode = code;
                    currentUser = { name: 'ПВЗ ' + code };
                    found = true;
                    document.getElementById('authBox').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                    document.getElementById('userNameDisplay').textContent = '🏪 ПВЗ ' + code;
                    showToast('👋 Добро пожаловать в ПВЗ!');
                    loadUsedNumbers();
                    viewOrders('collecting');
                }
            });
            if (!found) showToast('❌ Неверный код ПВЗ', true);
        } else { showToast('❌ ПВЗ не найден', true); }
    });
}

function logout() {
    currentUser = null; currentPvzCode = null;
    document.getElementById('authBox').classList.remove('hidden');
    document.getElementById('mainContent').classList.add('hidden');
    document.getElementById('userNameDisplay').textContent = 'Гость';
    showToast('👋 Выход выполнен');
}

function loadUsedNumbers() {
    db.ref('orders').once('value', (sn) => {
        usedPickupNumbers = [];
        sn.forEach(child => {
            const o = child.val();
            if (o.pickupNumber) usedPickupNumbers.push(o.pickupNumber);
        });
    });
}

function generateRandomPickupNumber() {
    return new Promise((resolve) => {
        db.ref('orders').once('value', (sn) => {
            const used = [];
            sn.forEach(child => { const o = child.val(); if (o.pickupNumber) used.push(o.pickupNumber); });
            usedPickupNumbers = used;
            const all = [];
            for (let i = 0; i < 1000; i++) all.push(String(i).padStart(3, '0'));
            const avail = all.filter(n => !used.includes(n));
            if (!avail.length) { resolve(String(Math.floor(Math.random() * 900) + 100).padStart(3, '0')); return; }
            resolve(avail[Math.floor(Math.random() * avail.length)]);
        });
    });
}

function getStatusName(s) {
    const m = { 'collecting': '🟡 Собирается', 'ready': '✅ Готов', 'delivered': '📦 Выдан', 'return': '🔄 Возврат' };
    return m[s] || s;
}

function viewOrders(type) {
    const container = document.getElementById('ordersList');
    const status = { 'collecting': 'collecting', 'ready': 'ready', 'return': 'return' }[type] || 'collecting';
    const names = { 'collecting': '🟡 Собирается', 'ready': '✅ Готов', 'return': '🔄 Возврат' };
    db.ref('orders').orderByChild('status').equalTo(status).on('value', (sn) => {
        const orders = [];
        sn.forEach(child => { orders.push({ id: child.key, ...child.val() }); });
        if (!orders.length) { container.innerHTML = `<div style="text-align:center;color:#555;padding:20px;">📭 Нет заказов</div>`; return; }
        container.innerHTML = orders.map(o => `
            <div class="order-card">
                <div class="order-header">
                    <span class="order-number">🆔 ${o.id}</span>
                    <span class="order-status status-${o.status}">${names[o.status] || o.status}</span>
                </div>
                <div>👤 ${o.userName || o.user}</div>
                <div>📱 ${o.phone || 'Не указан'}</div>
                <div style="margin:6px 0;">${o.items.map(i => `<div class="order-item"><div class="item-info">${i.name} x${i.qty}</div><div style="color:#f5a623;">${i.price * i.qty} ₽</div></div>`).join('')}</div>
                <div style="font-weight:bold;">💰 ${o.total} ₽</div>
                <div class="order-code">🔑 ${o.code}</div>
                ${o.pickupNumber ? `<div style="text-align:center;margin:6px 0;"><span class="order-pickup-number">📋 ${o.pickupNumber}</span></div>` : ''}
                <div class="order-delivery-info">📍 ПВЗ: <span>${o.pvz || 'Не выбран'}</span></div>
                <div class="order-delivery-info">💳 ${o.payment === 'now' ? 'Оплачено' : 'При получении'}</div>
                ${o.status === 'collecting' ? `<button class="btn-success" onclick="readyOrder('${o.id}')" style="margin-top:4px;padding:4px 12px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">✅ Готов к выдаче</button>` : ''}
                ${o.status === 'ready' ? `<button class="btn-primary" onclick="deliverOrder('${o.id}')" style="margin-top:4px;padding:4px 12px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">📤 Выдать</button>` : ''}
                ${(o.status === 'collecting' || o.status === 'ready') ? `<button class="btn-danger" onclick="returnOrder('${o.id}')" style="margin-top:4px;padding:4px 12px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">🔄 Возврат</button>` : ''}
            </div>
        `).join('');
    });
}

async function readyOrder(orderId) {
    if (scannedOrderId !== orderId) { showToast('❌ Сначала отсканируйте упаковку!', true); return; }
    const num = await generateRandomPickupNumber();
    db.ref('orders').orderByChild('id').equalTo(orderId).once('value', (sn) => {
        sn.forEach(child => {
            db.ref('orders/' + child.key).update({ status: 'ready', pickupNumber: num });
            usedPickupNumbers.push(num);
            showToast('✅ Заказ готов! Номер: ' + num);
            scannedOrderId = null;
            document.getElementById('scannedPackageResult').innerHTML = '';
            viewOrders('collecting');
        });
    });
}

function deliverOrder(orderId) {
    if (!confirm('Выдать заказ?')) return;
    db.ref('orders').orderByChild('id').equalTo(orderId).once('value', (sn) => {
        sn.forEach(child => {
            const o = child.val();
            db.ref('orders/' + child.key).update({ status: 'delivered', deliveredAt: Date.now() });
            if (o.payment === 'on_delivery') {
                db.ref('users').orderByChild('phone').equalTo(o.phone).once('value', (userSn) => {
                    userSn.forEach(userChild => {
                        const u = userChild.val();
                        const newW = (u.wallet || 0) - o.total;
                        db.ref('users/' + userChild.key).update({ wallet: newW });
                        showToast('💳 Списано ' + o.total + ' ₽');
                    });
                });
            }
            showToast('✅ Заказ выдан!');
            viewOrders('ready');
        });
    });
}

function returnOrder(orderId) {
    db.ref('orders').orderByChild('id').equalTo(orderId).once('value', (sn) => {
        sn.forEach(child => {
            const o = child.val();
            if (o.status === 'delivered' && o.deliveredAt) {
                const days = (Date.now() - o.deliveredAt) / (1000 * 60 * 60 * 24);
                if (days > 14) { showToast('❌ Прошло более 14 дней', true); return; }
            }
            if (!confirm('Возврат заказа #' + o.id + '?')) return;
            db.ref('orders/' + child.key).update({ status: 'return', returnedAt: Date.now() });
            db.ref('users').orderByChild('phone').equalTo(o.phone).once('value', (userSn) => {
                userSn.forEach(userChild => {
                    const u = userChild.val();
                    const newW = (u.wallet || 0) + o.total;
                    db.ref('users/' + userChild.key).update({ wallet: newW });
                    showToast('💰 Возвращено ' + o.total + ' ₽');
                });
            });
            showToast('🔄 Возврат оформлен');
            viewOrders('collecting');
        });
    });
}

// ========== ФИЗИЧЕСКИЙ СКАНЕР ==========
function physicalScanHandler(value) {
    if (!value || value.length < 3) return;
    document.getElementById('physicalScanInput').value = '';
    // Ищем заказ по отсканированным данным
    findOrderByPackage(value);
}

// ========== СКАНИРОВАНИЕ УПАКОВКИ ==========
function startPackageScanner(type) {
    const container = document.getElementById('packageScanner');
    const resultDiv = document.getElementById('scannedPackageResult');
    container.classList.remove('hidden');
    resultDiv.innerHTML = '';
    
    if (type === 'physical') {
        // Физический сканер - просто показываем поле ввода
        showToast('🔍 Наведите физический сканер на QR-код');
        document.getElementById('physicalScanInput').focus();
        return;
    }
    
    // Камера
    showToast('📷 Наведите на QR-код на упаковке...');
    if (packageScanner) { packageScanner.stop().then(() => { packageScanner.clear(); startPackageScannerNow(); }).catch(() => { startPackageScannerNow(); }); } 
    else { startPackageScannerNow(); }
}

function startPackageScannerNow() {
    packageScanner = new Html5Qrcode("packageScanner");
    const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
    packageScanner.start({ facingMode: "environment" }, config, onPackageScanSuccess, onPackageScanError)
        .then(() => showToast('📷 Сканирование упаковки...'))
        .catch(err => { showToast('❌ Ошибка: ' + err, true); document.getElementById('packageScanner').classList.add('hidden'); });
}

function onPackageScanSuccess(decodedText) {
    showToast('✅ Упаковка отсканирована!');
    document.getElementById('packageScanner').classList.add('hidden');
    stopPackageScanner();
    try { const data = JSON.parse(decodedText); findOrderByPackage(data.orderId || data.code || decodedText); } 
    catch(e) { findOrderByPackage(decodedText); }
}
function onPackageScanError(error) {}

function stopPackageScanner() {
    if (packageScanner) { try { packageScanner.stop(); packageScanner.clear(); } catch(e) {} }
    document.getElementById('packageScanner').classList.add('hidden');
}

function findOrderByPackage(text) {
    const resultDiv = document.getElementById('scannedPackageResult');
    db.ref('orders').once('value', (sn) => {
        let found = false;
        sn.forEach(child => {
            const o = child.val();
            if (o.id === text || o.code === text) {
                found = true;
                scannedOrderId = o.id;
                resultDiv.innerHTML = `
                    <div class="scanned-package">
                        <div style="color:#4CAF50;font-weight:bold;">✅ Упаковка отсканирована!</div>
                        <div>📦 Заказ: ${o.id}</div>
                        <div>👤 ${o.userName || o.user}</div>
                        <div>📱 ${o.phone || 'Не указан'}</div>
                        <div>📌 Статус: ${getStatusName(o.status)}</div>
                        <div style="margin-top:8px;color:#888;font-size:0.8rem;">Теперь можно нажать "Готов к выдаче"</div>
                        <div class="code-display">📋 Номер для выдачи: ${o.pickupNumber || 'Будет сгенерирован случайно'}</div>
                    </div>
                `;
            }
        });
        if (!found) { resultDiv.innerHTML = '<div style="color:#ff4444;padding:12px;border:1px solid #ff4444;border-radius:12px;">❌ Заказ не найден</div>'; }
    });
}

// ========== СКАНИРОВАНИЕ ЗАКАЗА ==========
function startOrderScanner(type) {
    const container = document.getElementById('orderScanner');
    const resultDiv = document.getElementById('scannedResult');
    container.classList.remove('hidden');
    resultDiv.innerHTML = '';
    
    if (type === 'physical') {
        showToast('🔍 Наведите физический сканер на QR-код заказа');
        document.getElementById('scannerInput').focus();
        return;
    }
    
    showToast('📷 Сканирование заказа...');
    if (orderScanner) { orderScanner.stop().then(() => { orderScanner.clear(); startOrderScannerNow(); }).catch(() => { startOrderScannerNow(); }); } 
    else { startOrderScannerNow(); }
}

function startOrderScannerNow() {
    orderScanner = new Html5Qrcode("orderScanner");
    const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
    orderScanner.start({ facingMode: "environment" }, config, onOrderScanSuccess, onOrderScanError)
        .then(() => showToast('📷 Камера работает'))
        .catch(err => { showToast('❌ Ошибка: ' + err, true); document.getElementById('orderScanner').classList.add('hidden'); });
}

function onOrderScanSuccess(decodedText) {
    showToast('✅ QR-код считан!');
    document.getElementById('orderScanner').classList.add('hidden');
    stopOrderScanner();
    try { const data = JSON.parse(decodedText); findOrderByText(data.orderId || decodedText); } 
    catch(e) { findOrderByText(decodedText); }
}
function onOrderScanError(error) {}

function stopOrderScanner() {
    if (orderScanner) { try { orderScanner.stop(); orderScanner.clear(); } catch(e) {} }
    document.getElementById('orderScanner').classList.add('hidden');
    showToast('⏹ Сканирование остановлено');
}

function manualSearch(value) {
    if (!value || value.length < 3) return;
    findOrderByText(value);
    document.getElementById('scannerInput').value = '';
}

function findOrderByText(text) {
    const resultDiv = document.getElementById('scannedResult');
    db.ref('orders').once('value', (sn) => {
        let found = false;
        sn.forEach(child => {
            const o = child.val();
            if (o.id === text || o.code === text) {
                found = true;
                resultDiv.innerHTML = `
                    <div class="scanned-order">
                        <div style="color:#4CAF50;font-weight:bold;">✅ Заказ найден!</div>
                        <div><span class="label">🆔</span> ${o.id}</div>
                        <div><span class="label">👤</span> ${o.userName || o.user}</div>
                        <div><span class="label">📱</span> ${o.phone || 'Не указан'}</div>
                        <div><span class="label">💰</span> ${o.total} ₽</div>
                        <div><span class="label">🔑</span> ${o.code}</div>
                        ${o.pickupNumber ? `<div><span class="label">📋 Номер:</span> <span class="order-pickup-number">${o.pickupNumber}</span></div>` : ''}
                        <div><span class="label">📌 Статус:</span> ${getStatusName(o.status)}</div>
                        ${o.status === 'collecting' ? `<button class="btn-success" onclick="readyOrder('${o.id}')" style="margin-top:8px;padding:8px 20px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">✅ Готов</button>` : ''}
                        ${o.status === 'ready' ? `<button class="btn-primary" onclick="deliverOrder('${o.id}')" style="margin-top:8px;padding:8px 20px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">📤 Выдать</button>` : ''}
                        ${(o.status === 'collecting' || o.status === 'ready') ? `<button class="btn-danger" onclick="returnOrder('${o.id}')" style="margin-top:8px;padding:8px 20px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">🔄 Возврат</button>` : ''}
                    </div>
                `;
            }
        });
        if (!found) { resultDiv.innerHTML = '<div style="color:#ff4444;">❌ Заказ не найден</div>'; }
    });
}

function findOrder(code) {
    const result = document.getElementById('pvzResult');
    if (!code || code.length < 6) { result.innerHTML = ''; return; }
    db.ref('orders').orderByChild('code').equalTo(code).once('value', (sn) => {
        if (sn.exists()) {
            sn.forEach(child => {
                const o = child.val();
                result.innerHTML = `
                    <div style="background:rgba(76,175,80,0.15);padding:12px;border-radius:12px;border:1px solid #4CAF50;">
                        <div style="color:#4CAF50;font-weight:bold;">✅ Заказ найден!</div>
                        <div>👤 ${o.userName || o.user}</div>
                        <div>📱 ${o.phone || 'Не указан'}</div>
                        <div>💰 ${o.total} ₽</div>
                        <div>Код: ${o.code}</div>
                        <div>Статус: ${getStatusName(o.status)}</div>
                        ${o.status === 'collecting' ? `<button class="btn-success" onclick="readyOrder('${o.id}')" style="margin-top:8px;padding:8px 20px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">✅ Готов</button>` : ''}
                        ${o.status === 'ready' ? `<button class="btn-primary" onclick="deliverOrder('${o.id}')" style="margin-top:8px;padding:8px 20px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">📤 Выдать</button>` : ''}
                        ${(o.status === 'collecting' || o.status === 'ready') ? `<button class="btn-danger" onclick="returnOrder('${o.id}')" style="margin-top:8px;padding:8px 20px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">🔄 Возврат</button>` : ''}
                    </div>
                `;
            });
        } else { result.innerHTML = '<div style="color:#ff4444;">❌ Заказ не найден</div>'; }
    });
}
